<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="#0d2d6b"/>

  <!-- Bar chart background bars -->
  <rect x="120" y="580" width="90" height="320" fill="#1a4a9f" opacity="0.7"/>
  <rect x="230" y="500" width="90" height="400" fill="#1a4a9f" opacity="0.7"/>
  <rect x="340" y="440" width="90" height="460" fill="#1a5abf" opacity="0.7"/>
  <rect x="450" y="380" width="90" height="520" fill="#1a5abf" opacity="0.7"/>
  <rect x="560" y="300" width="90" height="600" fill="#1a6acf" opacity="0.7"/>
  <rect x="670" y="220" width="90" height="680" fill="#1a6acf" opacity="0.7"/>
  <rect x="780" y="150" width="90" height="750" fill="#1a7adf" opacity="0.7"/>

  <!-- Mountain/line chart overlay -->
  <polyline points="80,750 280,550 420,620 580,420 750,300 900,180"
            fill="none" stroke="#2de6c4" stroke-width="18" stroke-linejoin="round" stroke-linecap="round" opacity="0.5"/>

  <!-- Big upward arrow (diagonal) -->
  <line x1="160" y1="820" x2="820" y2="200" stroke="#2de6c4" stroke-width="36" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="820,200 680,240 760,320" fill="#2de6c4"/>

  <!-- Small upward arrow (top right) -->
  <line x1="680" y1="380" x2="880" y2="160" stroke="#2de6c4" stroke-width="28" stroke-linecap="round"/>
  <polygon points="880,160 760,195 820,270" fill="#2de6c4"/>

  <!-- "LEVEL" text -->
  <text x="512" y="480"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="170"
        fill="#2de6c4"
        text-anchor="middle"
        stroke="#0d2d6b"
        stroke-width="8"
        letter-spacing="2">LEVEL</text>

  <!-- "UP" text -->
  <text x="512" y="650"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="210"
        fill="#2de6c4"
        text-anchor="middle"
        stroke="#0d2d6b"
        stroke-width="10"
        letter-spacing="6">UP</text>

  <!-- "Reboot" text -->
  <text x="512" y="800"
        font-family="Arial, sans-serif"
        font-weight="500"
        font-size="110"
        fill="#5ef0d8"
        text-anchor="middle"
        letter-spacing="4">Reboot</text>
</svg>
