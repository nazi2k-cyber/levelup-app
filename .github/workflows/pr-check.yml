name: PR 검증

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read

jobs:
  # 1. 파일 구조 및 구문 검증
  validate:
    name: 파일 검증
    runs-on: ubuntu-22.04
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5

      - name: JSON 파일 구문 검증
        run: |
          echo "📋 JSON 파일 검증 시작..."
          ERRORS=0
          for f in package.json firebase.json capacitor.config.json firestore.indexes.json www/manifest.json; do
            if [ -f "$f" ]; then
              if python3 -m json.tool "$f" > /dev/null 2>&1; then
                echo "  ✅ $f"
              else
                echo "  ❌ $f — JSON 구문 오류"
                ERRORS=$((ERRORS + 1))
              fi
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::JSON 구문 오류가 ${ERRORS}개 발견되었습니다."
            exit 1
          fi
          echo "✅ 모든 JSON 파일 검증 통과"

      - name: VERSION 파일 형식 검증
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION 파일이 올바른 시맨틱 버전 형식(X.Y.Z)이 아닙니다: '$VERSION'"
            exit 1
          fi
          echo "✅ VERSION 파일 형식 OK: $VERSION"

      - name: 필수 파일 존재 확인
        run: |
          MISSING=0
          for f in www/app.html www/app.js www/style.css www/data.js package.json VERSION firebase.json; do
            if [ ! -f "$f" ]; then
              echo "::error::필수 파일이 누락되었습니다: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            exit 1
          fi
          echo "✅ 필수 파일 모두 존재"

  # 2. Firestore 보안 규칙 자동화 테스트 (에뮬레이터 기반)
  firestore-rules:
    name: Firestore Rules 자동화 테스트
    runs-on: ubuntu-22.04
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5

      - name: Node.js 셋업
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: Java 셋업 (Firebase Emulator 요구사항)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Firebase CLI 설치
        run: npm install -g firebase-tools

      - name: Firestore Rules 테스트 실행
        run: npm run test:rules

  # 3. 민감 정보 유출 방지
  secret-scan:
    name: 민감 정보 스캔
    runs-on: ubuntu-22.04
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5

      - name: 민감 정보 패턴 스캔
        run: |
          echo "🔍 민감 정보 패턴 스캔 시작..."
          FOUND=0

          # API 키, 시크릿, 토큰 패턴 검사 (알려진 안전한 패턴 제외)
          # firebase config의 공개 키는 제외 (apiKey는 클라이언트용 공개 값)
          PATTERNS=(
            "-----BEGIN (RSA |EC )?PRIVATE KEY-----"
            "AKIA[0-9A-Z]{16}"
            "sk_live_[a-zA-Z0-9]+"
            "ghp_[a-zA-Z0-9]{36}"
            "xoxb-[0-9]+-[0-9]+-[a-zA-Z0-9]+"
          )

          for pattern in "${PATTERNS[@]}"; do
            if grep -rE "$pattern" --include="*.js" --include="*.html" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.rules" . 2>/dev/null | grep -v node_modules | grep -v ".git/" | grep -v "tesseract-core/"; then
              echo "::error::민감 정보 패턴이 발견되었습니다: $pattern"
              FOUND=$((FOUND + 1))
            fi
          done

          if [ $FOUND -gt 0 ]; then
            echo "::error::${FOUND}개의 민감 정보 패턴이 발견되었습니다. 커밋에서 제거해주세요."
            exit 1
          fi
          echo "✅ 민감 정보 패턴 스캔 통과"

      - name: .env 파일 커밋 방지
        run: |
          if find . -name ".env" -o -name ".env.local" -o -name ".env.production" | grep -v node_modules | grep -q .; then
            echo "::error::.env 파일이 저장소에 포함되어 있습니다. .gitignore에 추가해주세요."
            exit 1
          fi
          echo "✅ .env 파일 없음"

  # 4. Android 빌드 검증 (선택적 - 빌드 깨짐 방지)
  build-check:
    name: 빌드 검증
    runs-on: ubuntu-22.04
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Node.js 셋업
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: npm 패키지 설치
        run: npm ci

      - name: JavaScript 기본 구문 검증
        run: |
          echo "📋 JavaScript 구문 검증..."
          ERRORS=0
          for f in www/app.js www/data.js www/logger.js www/sw.js www/firebase-messaging-sw.js; do
            if [ -f "$f" ]; then
              if node --check "$f" 2>/dev/null; then
                echo "  ✅ $f"
              else
                echo "  ❌ $f — 구문 오류"
                ERRORS=$((ERRORS + 1))
              fi
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::JavaScript 구문 오류가 ${ERRORS}개 발견되었습니다."
            exit 1
          fi
          echo "✅ JavaScript 구문 검증 통과"

      - name: www 디렉토리 검증
        run: |
          # www/ 디렉토리에 필수 웹 파일이 존재하는지 확인
          MISSING=0
          for f in www/app.html www/app.js www/style.css www/data.js www/sw.js www/manifest.json; do
            if [ ! -f "$f" ]; then
              echo "::error::www/ 디렉토리에 필수 파일이 누락되었습니다: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            exit 1
          fi
          echo "✅ www/ 디렉토리 필수 파일 검증 통과"
