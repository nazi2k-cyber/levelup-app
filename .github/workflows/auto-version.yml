name: 자동 버전 관리

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-version:
    # 무한 루프 방지: github-actions[bot]이 만든 커밋은 스킵
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃 (전체 이력 필요)
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      # 2. [skip ci] 체크 — 해당 시 종료
      - name: Skip CI 확인
        id: skip_check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ [skip ci] 감지 — 버전 업데이트 스킵"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # 3. 초기 태그 부트스트랩: v* 태그가 없으면 현재 VERSION으로 태그 생성
      - name: 초기 태그 생성
        if: steps.skip_check.outputs.skip == 'false'
        id: bootstrap
        run: |
          if ! git tag -l 'v*' | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
            git tag -a "v${CURRENT_VERSION}" -m "초기 버전 태그: v${CURRENT_VERSION}"
            git push origin "v${CURRENT_VERSION}"
            echo "✅ 초기 태그 v${CURRENT_VERSION} 생성"
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
          fi

      # 4. 버전 증가 유형 결정 (커밋 메시지 키워드 스캔)
      #    [major] → 메이저, [minor] → 마이너, 기본 → 패치
      - name: 버전 증가 유형 결정
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false'
        id: bump_type
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=%B)
          if echo "$COMMITS" | grep -qi '\[major\]'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
            echo "📦 버전 증가 유형: major"
          elif echo "$COMMITS" | grep -qi '\[minor\]'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
            echo "📦 버전 증가 유형: minor"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            echo "📦 버전 증가 유형: patch"
          fi

      # 5. 새 버전 계산
      - name: 새 버전 계산
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false'
        id: new_version
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ steps.bump_type.outputs.bump }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 버전 업데이트: $CURRENT → $NEW_VERSION ($BUMP)"

      # 6. 기존 버전 PR이 열려있는지 확인
      - name: 기존 버전 PR 확인
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false'
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --head "auto-version/v${{ steps.new_version.outputs.version }}" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ 이미 열린 버전 PR #${EXISTING_PR} 존재 — 스킵"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # 7. 버전 브랜치 생성 및 파일 업데이트
      - name: 버전 브랜치 생성 및 업데이트
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false' && steps.check_pr.outputs.exists == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          BRANCH_NAME="auto-version/v${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 기존 원격 브랜치가 있으면 삭제 (이전 실행에서 남은 브랜치)
          if git ls-remote --heads origin "${BRANCH_NAME}" | grep -q .; then
            git push origin --delete "${BRANCH_NAME}" 2>/dev/null || true
            echo "⚠️ 기존 원격 브랜치 ${BRANCH_NAME} 삭제 (충돌 방지)"
          fi

          # 새 브랜치 생성
          git checkout -b "${BRANCH_NAME}"

          # 버전 동기화
          bash scripts/version-bump.sh "${NEW_VERSION}"

          # CHANGELOG.md 업데이트
          TODAY=$(date -u +%Y-%m-%d)
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            ENTRIES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" \
              --no-merges \
              | grep -v "^- sync:" \
              | grep -v "\[skip ci\]" \
              | grep -v "^- chore:" \
              | head -30)
          else
            ENTRIES="- 버전 자동 관리 시작"
          fi

          if [ -z "$ENTRIES" ]; then
            ENTRIES="- 소규모 업데이트 및 개선"
          fi

          {
            echo "## [${NEW_VERSION}] - ${TODAY}"
            echo ""
            echo "### 변경"
            echo "$ENTRIES"
            echo ""
          } > /tmp/changelog_block.txt

          if grep -q "^## \[" CHANGELOG.md; then
            LINE_NUM=$(grep -n "^## \[" CHANGELOG.md | head -1 | cut -d: -f1)
            { head -n $((LINE_NUM - 1)) CHANGELOG.md; cat /tmp/changelog_block.txt; tail -n +"${LINE_NUM}" CHANGELOG.md; } > /tmp/changelog_new.md
            mv /tmp/changelog_new.md CHANGELOG.md
          else
            cat /tmp/changelog_block.txt >> CHANGELOG.md
          fi

          # 변경된 파일 커밋
          git add VERSION CHANGELOG.md package.json functions/package.json 2>/dev/null || true
          git add sw.js www/sw.js 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "chore: v${NEW_VERSION} 자동 버전 업데이트"
            git push origin "${BRANCH_NAME}"
            echo "✅ 브랜치 ${BRANCH_NAME} push 완료"
          else
            echo "ℹ️ 버전 관련 변경사항 없음 — 스킵"
            echo "no_changes=true" >> "$GITHUB_ENV"
          fi

      # 8. PR 생성 및 자동 머지
      - name: PR 생성 및 자동 머지
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false' && steps.check_pr.outputs.exists == 'false' && env.no_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          BRANCH_NAME="auto-version/v${NEW_VERSION}"

          # PR 생성
          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH_NAME}" \
            --title "chore: v${NEW_VERSION} 자동 버전 업데이트" \
            --body "## 자동 버전 업데이트

          버전 \`v${NEW_VERSION}\` 으로 자동 업데이트합니다.

          ### 업데이트된 파일
          - \`VERSION\`
          - \`CHANGELOG.md\`
          - \`package.json\`
          - \`functions/package.json\`
          - \`sw.js\` / \`www/sw.js\`

          > 이 PR은 자동 생성되었습니다. 상태 체크 통과 후 자동 머지됩니다." 2>&1) || {
            echo "::warning::PR 생성 실패. 리포지토리 설정에서 'Allow GitHub Actions to create and approve pull requests'를 활성화하거나 PAT_TOKEN 시크릿을 설정하세요."
            echo "::warning::브랜치 '${BRANCH_NAME}'가 push되었습니다. 수동으로 PR을 생성할 수 있습니다: https://github.com/${{ github.repository }}/compare/main...${BRANCH_NAME}"
            exit 0
          }

          echo "✅ PR 생성: ${PR_URL}"

          # 자동 머지 활성화 (상태 체크 통과 후 자동으로 머지)
          gh pr merge "${BRANCH_NAME}" --auto --squash --delete-branch || echo "⚠️ 자동 머지 설정 실패 — 수동 머지 필요"

      # 9. 태그 생성
      - name: 태그 생성
        id: tag_step
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false' && steps.check_pr.outputs.exists == 'false' && env.no_changes != 'true'
        continue-on-error: true
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"

          # 원격에 동일 태그가 있으면 삭제 (롤백 등으로 인한 태그 충돌 방지)
          if git ls-remote --tags origin "refs/tags/v${NEW_VERSION}" | grep -q .; then
            git push origin ":refs/tags/v${NEW_VERSION}" 2>/dev/null || true
            echo "⚠️ 원격의 기존 v${NEW_VERSION} 태그 삭제 (충돌 방지)"
          fi
          git tag -d "v${NEW_VERSION}" 2>/dev/null || true

          # 새 태그 생성 및 push
          git tag -a "v${NEW_VERSION}" -m "릴리즈 v${NEW_VERSION}"
          if git push origin "v${NEW_VERSION}"; then
            echo "✅ v${NEW_VERSION} 태그 생성 및 push 완료"
            echo "tag_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::태그 v${NEW_VERSION} push 실패 — 리포지토리 규칙(rulesets)에서 태그 생성이 제한되어 있습니다. Settings > Rules 에서 태그 생성 권한을 확인하세요."
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
          fi

      # 10. 결과 요약
      - name: 결과 요약
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          echo "## 🔖 자동 버전 업데이트 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 새 버전 | \`v${NEW_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 증가 유형 | \`${{ steps.bump_type.outputs.bump }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tag_step.outputs.tag_created }}" == "true" ]; then
            echo "| 태그 | ✅ \`v${NEW_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 태그 | ⚠️ 생성 실패 (리포지토리 규칙 제한) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 업데이트된 파일" >> $GITHUB_STEP_SUMMARY
          echo "- \`VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`CHANGELOG.md\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`package.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`functions/package.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`sw.js\` / \`www/sw.js\`" >> $GITHUB_STEP_SUMMARY
