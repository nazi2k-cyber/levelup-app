name: 자동 버전 관리

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  auto-version:
    # 무한 루프 방지: github-actions[bot]이 만든 커밋은 스킵
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃 (전체 이력 필요)
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. [skip ci] 체크 — 해당 시 종료
      - name: Skip CI 확인
        id: skip_check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ [skip ci] 감지 — 버전 업데이트 스킵"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # 3. 초기 태그 부트스트랩: v* 태그가 없으면 현재 VERSION으로 태그 생성
      - name: 초기 태그 생성
        if: steps.skip_check.outputs.skip == 'false'
        id: bootstrap
        run: |
          if ! git tag -l 'v*' | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
            git tag -a "v${CURRENT_VERSION}" -m "초기 버전 태그: v${CURRENT_VERSION}"
            git push origin "v${CURRENT_VERSION}"
            echo "✅ 초기 태그 v${CURRENT_VERSION} 생성"
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
          fi

      # 4. 버전 증가 유형 결정 (커밋 메시지 키워드 스캔)
      #    [major] → 메이저, [minor] → 마이너, 기본 → 패치
      - name: 버전 증가 유형 결정
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false'
        id: bump_type
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=%B)
          if echo "$COMMITS" | grep -qi '\[major\]'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
            echo "📦 버전 증가 유형: major"
          elif echo "$COMMITS" | grep -qi '\[minor\]'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
            echo "📦 버전 증가 유형: minor"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            echo "📦 버전 증가 유형: patch"
          fi

      # 5. 새 버전 계산
      - name: 새 버전 계산
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false'
        id: new_version
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ steps.bump_type.outputs.bump }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 버전 업데이트: $CURRENT → $NEW_VERSION ($BUMP)"

      # 6. 버전 동기화 (기존 version-bump.sh 재사용)
      - name: 버전 동기화
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false'
        run: bash scripts/version-bump.sh "${{ steps.new_version.outputs.version }}"

      # 7. CHANGELOG.md 자동 업데이트 (커밋 메시지 기반)
      - name: CHANGELOG.md 업데이트
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          TODAY=$(date -u +%Y-%m-%d)
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")

          # 마지막 태그 이후 커밋 메시지 수집 (머지 커밋, sync 커밋, [skip ci] 제외)
          if [ -n "$LAST_TAG" ]; then
            ENTRIES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" \
              --no-merges \
              | grep -v "^- sync:" \
              | grep -v "\[skip ci\]" \
              | grep -v "^- chore:" \
              | head -30)
          else
            ENTRIES="- 버전 자동 관리 시작"
          fi

          # 커밋이 없는 경우 기본 메시지
          if [ -z "$ENTRIES" ]; then
            ENTRIES="- 소규모 업데이트 및 개선"
          fi

          # 새 CHANGELOG 블록을 임시 파일에 생성
          {
            echo "## [${NEW_VERSION}] - ${TODAY}"
            echo ""
            echo "### 변경"
            echo "$ENTRIES"
            echo ""
          } > /tmp/changelog_block.txt

          # 기존 첫 번째 ## [ 항목 앞에 삽입
          if grep -q "^## \[" CHANGELOG.md; then
            LINE_NUM=$(grep -n "^## \[" CHANGELOG.md | head -1 | cut -d: -f1)
            { head -n $((LINE_NUM - 1)) CHANGELOG.md; cat /tmp/changelog_block.txt; tail -n +"${LINE_NUM}" CHANGELOG.md; } > /tmp/changelog_new.md
            mv /tmp/changelog_new.md CHANGELOG.md
          else
            # ## [ 항목이 없는 경우 파일 끝에 추가
            cat /tmp/changelog_block.txt >> CHANGELOG.md
          fi

          echo "✅ CHANGELOG.md에 v${NEW_VERSION} 항목 추가됨"

      # 8. 버전 변경사항 커밋 및 태그 생성
      - name: 버전 변경사항 커밋 및 태그
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 변경된 파일 스테이징
          git add VERSION CHANGELOG.md package.json functions/package.json 2>/dev/null || true
          git add sw.js www/sw.js 2>/dev/null || true

          # 변경사항이 있을 때만 커밋
          if ! git diff --cached --quiet; then
            git commit -m "chore: v${NEW_VERSION} 자동 버전 업데이트 [skip ci]"
            git tag -a "v${NEW_VERSION}" -m "릴리즈 v${NEW_VERSION}"

            # Race condition 대비 rebase 후 push
            git pull --rebase origin main || true
            git push origin main --follow-tags
            echo "✅ v${NEW_VERSION} 커밋 및 태그 생성 완료"
          else
            echo "ℹ️ 버전 관련 변경사항 없음 — 스킵"
          fi

      # 9. 결과 요약
      - name: 결과 요약
        if: steps.skip_check.outputs.skip == 'false' && steps.bootstrap.outputs.bootstrapped == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          echo "## 🔖 자동 버전 업데이트 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 새 버전 | \`v${NEW_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 증가 유형 | \`${{ steps.bump_type.outputs.bump }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 태그 | \`v${NEW_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 업데이트된 파일" >> $GITHUB_STEP_SUMMARY
          echo "- \`VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`CHANGELOG.md\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`package.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`functions/package.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`sw.js\` / \`www/sw.js\`" >> $GITHUB_STEP_SUMMARY
