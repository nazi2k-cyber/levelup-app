name: OWASP ZAP 침투 테스트 (분기별)

on:
  schedule:
    - cron: '0 2 1 1,4,7,10 *'  # 분기별: 1/4/7/10월 1일 02:00 UTC
  workflow_dispatch:

jobs:
  zap-scan:
    name: OWASP ZAP 자동 스캔
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'https://levelup-app-53d02.web.app'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-${{ github.run_id }}
          path: report_html.html
          retention-days: 90

      - name: Create Issue on Alerts
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[보안] OWASP ZAP 스캔 알림 — ${date}`,
              body: `## OWASP ZAP 분기별 침투 테스트 결과\n\n워크플로 실행: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n보고서 아티팩트를 확인하세요.`,
              labels: ['security']
            });
