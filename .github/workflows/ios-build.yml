name: iOS PR 빌드 검증

on:
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-build:
    runs-on: macos-15

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5

      - name: Xcode 버전 출력
        run: xcodebuild -version

      - name: Node.js 셋업
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: npm 패키지 설치
        run: npm ci

      - name: 웹 빌드 (스크립트 존재 시)
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.build?0:1)"; then
            npm run build
          else
            echo "ℹ️ package.json에 build 스크립트가 없어 웹 빌드를 건너뜁니다."
          fi

      - name: Capacitor 엔트리포인트 정합성 보정
        run: |
          if [ -f "www/app.html" ]; then
            cp www/app.html www/index.html
            echo "✅ www/app.html → www/index.html 복사 완료"
          else
            echo "ℹ️ www/app.html이 없어 엔트리포인트 복사를 건너뜁니다."
          fi

      - name: iOS 프로젝트 존재 확인
        run: |
          if [ ! -d "ios/App" ]; then
            echo "❌ iOS 네이티브 프로젝트(ios/App)가 없습니다."
            echo "   macOS에서 'npx cap add ios'를 실행한 뒤 ios/ 디렉토리를 커밋하세요."
            echo "   가이드: docs/ongoing/CAPACITOR_IOS_BUILD_DETAIL_PLAN.md"
            exit 1
          fi

      - name: Capacitor iOS 동기화
        run: npx cap sync ios
        env:
          CI: true

      - name: CocoaPods 설치
        working-directory: ios/App
        run: pod install

      - name: 시뮬레이터 빌드
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build
