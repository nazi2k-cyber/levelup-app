name: iOS PR 빌드 검증

on:
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-build:
    runs-on: macos-15

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5

      - name: Xcode 버전 출력
        run: xcodebuild -version

      - name: Node.js 셋업
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: npm 패키지 설치
        run: npm ci

      - name: 웹 빌드 (스크립트 존재 시)
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.build?0:1)"; then
            npm run build
          else
            echo "ℹ️ package.json에 build 스크립트가 없어 웹 빌드를 건너뜁니다."
          fi

      - name: Capacitor 엔트리포인트 정합성 보정
        run: |
          if [ -f "www/app.html" ]; then
            cp www/app.html www/index.html
            echo "✅ www/app.html → www/index.html 복사 완료"
          else
            echo "ℹ️ www/app.html이 없어 엔트리포인트 복사를 건너뜁니다."
          fi

      - name: iOS 플랫폼 의존성 보장
        run: |
          if node -e "const d=require('./package.json'); const deps={...(d.dependencies||{}),...(d.devDependencies||{})}; process.exit(deps['@capacitor/ios']?0:1)"; then
            echo "✅ @capacitor/ios 이미 선언됨"
          else
            echo "ℹ️ @capacitor/ios 미선언 - CI에서 임시 설치"
            npm install --no-save @capacitor/ios@^6.2.0
          fi

      - name: iOS 네이티브 프로젝트 생성/동기화
        env:
          CI: true
        run: |
          if [ ! -d "ios/App" ]; then
            echo "ℹ️ ios/App 없음 - CI에서 cap add ios 실행"
            npx cap add ios
          fi
          npx cap sync ios

      - name: CocoaPods 설치
        working-directory: ios/App
        run: pod install

      - name: 시뮬레이터 빌드
        working-directory: ios/App
        run: |
          set -o pipefail
          mkdir -p build-logs
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS=arm64 \
            ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee build-logs/xcodebuild.log

      - name: 빌드 실패 원인 요약
        if: failure()
        working-directory: ios/App
        run: |
          echo "=== xcodebuild error summary ==="
          rg -n "error:|\*\* BUILD FAILED \*\*|no such module|Undefined symbols|CodeSign|Provisioning" build-logs/xcodebuild.log | tail -n 50 || true

      - name: xcodebuild 로그 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcodebuild-log
          path: ios/App/build-logs/xcodebuild.log
