name: main 브랜치 보호 규칙 적용

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '실제 적용 없이 현재 상태만 조회'
        type: boolean
        default: false

jobs:
  audit-and-protect:
    name: 협업자 감사 및 브랜치 보호 적용
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Collaborators 목록 감사
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "=== Collaborators 감사 ==="
          RESULT=$(curl -s -o /tmp/collaborators.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/bravecat-studio/levelup-app/collaborators?affiliation=all&per_page=100")

          if [ "$RESULT" != "200" ]; then
            echo "⚠️  Collaborators 조회 실패 (HTTP $RESULT)"
            cat /tmp/collaborators.json
          else
            echo "현재 Collaborators:"
            jq -r '.[] | "  - \(.login) [\(.role_name // "unknown")]"' /tmp/collaborators.json
            TOTAL=$(jq length /tmp/collaborators.json)
            echo ""
            echo "총 $TOTAL 명"
          fi

      - name: 현재 main 브랜치 보호 상태 확인
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo ""
          echo "=== 현재 main 브랜치 보호 상태 ==="
          RESULT=$(curl -s -o /tmp/current_protection.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/bravecat-studio/levelup-app/branches/main/protection")

          if [ "$RESULT" = "404" ]; then
            echo "현재 보호 규칙 없음 (미설정 상태)"
          elif [ "$RESULT" = "200" ]; then
            echo "현재 보호 규칙 적용됨:"
            jq '{
              required_pr: .required_pull_request_reviews.required_approving_review_count,
              required_checks: [.required_status_checks.contexts[]],
              enforce_admins: .enforce_admins.enabled,
              allow_force_pushes: .allow_force_pushes.enabled,
              allow_deletions: .allow_deletions.enabled
            }' /tmp/current_protection.json 2>/dev/null || cat /tmp/current_protection.json
          else
            echo "조회 오류 (HTTP $RESULT)"
            cat /tmp/current_protection.json
          fi

      - name: main 브랜치 보호 규칙 적용
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo ""
          echo "=== main 브랜치 보호 규칙 적용 중 ==="

          PAYLOAD=$(cat <<'EOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "validate",
                "firestore-rules",
                "secret-scan",
                "build-check"
              ]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": true,
              "required_approving_review_count": 0
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false
          }
          EOF
          )

          RESULT=$(curl -s -o /tmp/protection_result.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/bravecat-studio/levelup-app/branches/main/protection")

          if [ "$RESULT" = "200" ]; then
            echo "✅ 브랜치 보호 규칙 적용 성공"
          else
            echo "❌ 적용 실패 (HTTP $RESULT)"
            cat /tmp/protection_result.json
            exit 1
          fi

      - name: 적용 결과 검증
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo ""
          echo "=== 적용 결과 검증 ==="
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/bravecat-studio/levelup-app/branches/main/protection" \
          | jq '{
              "✅ main 직접 push 차단": "PR 필수 (PR 없이 merge 불가)",
              "required_approving_reviews": .required_pull_request_reviews.required_approving_review_count,
              "dismiss_stale_reviews": .required_pull_request_reviews.dismiss_stale_reviews,
              "require_codeowners_review": .required_pull_request_reviews.require_code_owner_reviews,
              "required_status_checks": [.required_status_checks.contexts[]],
              "strict_status_checks": .required_status_checks.strict,
              "enforce_admins": .enforce_admins.enabled,
              "allow_force_pushes": .allow_force_pushes.enabled,
              "allow_deletions": .allow_deletions.enabled
            }'

          echo ""
          echo "완료: main 브랜치 직접 push 차단 활성화됨"
          echo "  - PR 없이 merge: 불가"
          echo "  - force push: 차단"
          echo "  - 브랜치 삭제: 차단"
          echo "  - 필수 status check: validate, firestore-rules, secret-scan, build-check"
