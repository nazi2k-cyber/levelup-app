name: Firebase Functions & Hosting 배포

on:
  push:
    branches: [ "main" ]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'www/**'
      - 'push-test.html'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '배포 대상'
        required: true
        type: choice
        options:
          - auto
          - all
          - functions
          - hosting
          - firestore
        default: 'auto'

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

env:
  FIREBASE_PROJECT: levelup-app-53d02
  FUNCTIONS_REGION: asia-northeast3

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Node.js 셋업
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Google 서비스 계정 인증
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Firebase CLI 설치
        run: npm install -g firebase-tools

      - name: 변경된 파일 감지 및 배포 대상 결정
        id: detect
        run: |
          MANUAL_TARGET="${{ github.event.inputs.deploy_target }}"

          if [ "$MANUAL_TARGET" = "all" ]; then
            echo "deploy_functions=true" >> "$GITHUB_OUTPUT"
            echo "deploy_hosting=true" >> "$GITHUB_OUTPUT"
            echo "deploy_firestore=true" >> "$GITHUB_OUTPUT"
            echo "전체 배포 (수동 선택)"
            exit 0
          fi

          if [ "$MANUAL_TARGET" = "functions" ]; then
            echo "deploy_functions=true" >> "$GITHUB_OUTPUT"
            echo "deploy_hosting=false" >> "$GITHUB_OUTPUT"
            echo "deploy_firestore=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$MANUAL_TARGET" = "hosting" ]; then
            echo "deploy_functions=false" >> "$GITHUB_OUTPUT"
            echo "deploy_hosting=true" >> "$GITHUB_OUTPUT"
            echo "deploy_firestore=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$MANUAL_TARGET" = "firestore" ]; then
            echo "deploy_functions=false" >> "$GITHUB_OUTPUT"
            echo "deploy_hosting=false" >> "$GITHUB_OUTPUT"
            echo "deploy_firestore=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # auto: 변경된 파일 기반으로 판단
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "변경된 파일:"
          echo "$CHANGED"

          DEPLOY_FUNCTIONS=false
          DEPLOY_HOSTING=false
          DEPLOY_FIRESTORE=false

          if echo "$CHANGED" | grep -qE '^functions/'; then
            DEPLOY_FUNCTIONS=true
          fi
          if echo "$CHANGED" | grep -qE '^(www/|push-test\.html)'; then
            DEPLOY_HOSTING=true
          fi
          if echo "$CHANGED" | grep -qE '^(firestore\.rules|firestore\.indexes\.json)'; then
            DEPLOY_FIRESTORE=true
          fi
          if echo "$CHANGED" | grep -qE '^firebase\.json'; then
            DEPLOY_FUNCTIONS=true
            DEPLOY_HOSTING=true
            DEPLOY_FIRESTORE=true
          fi

          # workflow_dispatch(auto)에서 변경 감지 실패 시 전체 배포
          if [ "$DEPLOY_FUNCTIONS" = "false" ] && [ "$DEPLOY_HOSTING" = "false" ] && [ "$DEPLOY_FIRESTORE" = "false" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              DEPLOY_FUNCTIONS=true
              DEPLOY_HOSTING=true
              DEPLOY_FIRESTORE=true
            fi
          fi

          echo "deploy_functions=$DEPLOY_FUNCTIONS" >> "$GITHUB_OUTPUT"
          echo "deploy_hosting=$DEPLOY_HOSTING" >> "$GITHUB_OUTPUT"
          echo "deploy_firestore=$DEPLOY_FIRESTORE" >> "$GITHUB_OUTPUT"
          echo "Functions=$DEPLOY_FUNCTIONS, Hosting=$DEPLOY_HOSTING, Firestore=$DEPLOY_FIRESTORE"

      - name: Functions 환경변수 생성 (.env)
        if: steps.detect.outputs.deploy_functions == 'true'
        run: |
          cat > functions/.env <<EOF
          ADMIN_EMAILS=${{ secrets.ADMIN_EMAILS }}
          MASTER_EMAILS=${{ secrets.MASTER_EMAILS }}
          AZURE_CS_ENDPOINT=${{ secrets.AZURE_CS_ENDPOINT }}
          AZURE_CS_KEY=${{ secrets.AZURE_CS_KEY }}
          ALADIN_TTB_KEY=${{ secrets.ALADIN_TTB_KEY }}
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          EOF
          # 각 줄 앞의 공백 제거 (HEREDOC 들여쓰기)
          sed -i 's/^[[:space:]]*//' functions/.env

      - name: Functions 의존성 설치
        if: steps.detect.outputs.deploy_functions == 'true'
        run: cd functions && npm ci

      - name: 고아 함수 정리 (sendRaidAlerts — 이전 버전 잔존)
        if: steps.detect.outputs.deploy_functions == 'true'
        run: |
          echo "고아 함수/스케줄러 정리 시도..."
          gcloud functions delete sendRaidAlerts \
            --region=${{ env.FUNCTIONS_REGION }} --gen2 --quiet 2>/dev/null && \
            echo "✅ sendRaidAlerts 함수 삭제 완료" || \
            echo "ℹ️ sendRaidAlerts 함수 없음 (이미 정리됨)"
          gcloud scheduler jobs delete firebase-schedule-sendRaidAlerts-${{ env.FUNCTIONS_REGION }} \
            --location=${{ env.FUNCTIONS_REGION }} --quiet 2>/dev/null && \
            echo "✅ sendRaidAlerts 스케줄러 삭제 완료" || \
            echo "ℹ️ sendRaidAlerts 스케줄러 없음 (이미 정리됨)"

      - name: Eventarc/Pub/Sub IAM 바인딩 확인 및 설정 (Storage 트리거용)
        if: steps.detect.outputs.deploy_functions == 'true'
        run: |
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.FIREBASE_PROJECT }} --format='value(projectNumber)')
          echo "Project Number: ${PROJECT_NUMBER}"

          BINDINGS=(
            "serviceAccount:service-${PROJECT_NUMBER}@gs-project-accounts.iam.gserviceaccount.com|roles/pubsub.publisher"
            "serviceAccount:service-${PROJECT_NUMBER}@gcp-sa-pubsub.iam.gserviceaccount.com|roles/iam.serviceAccountTokenCreator"
            "serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com|roles/run.invoker"
            "serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com|roles/eventarc.eventReceiver"
            "serviceAccount:service-${PROJECT_NUMBER}@gcp-sa-eventarc.iam.gserviceaccount.com|roles/storage.objectViewer"
          )

          # 현재 IAM 정책을 한 번만 조회 (API 호출 절약)
          CURRENT_POLICY=$(gcloud projects get-iam-policy ${{ env.FIREBASE_PROJECT }} --format=json 2>/dev/null || echo "")

          SKIPPED=0
          ADDED=0
          FAILED=0
          for BINDING in "${BINDINGS[@]}"; do
            MEMBER="${BINDING%%|*}"
            ROLE="${BINDING##*|}"

            # 기존 바인딩 존재 여부 확인
            if [ -n "$CURRENT_POLICY" ] && echo "$CURRENT_POLICY" | grep -q "$ROLE" && echo "$CURRENT_POLICY" | grep -q "$MEMBER"; then
              echo "✅ 이미 설정됨: ${ROLE} for ${MEMBER}"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "→ 설정 중: ${ROLE} for ${MEMBER}"
            if gcloud projects add-iam-policy-binding ${{ env.FIREBASE_PROJECT }} \
              --member="${MEMBER}" --role="${ROLE}" --condition=None --quiet 2>/dev/null; then
              echo "✅ 바인딩 추가 완료: ${ROLE}"
              ADDED=$((ADDED + 1))
            else
              echo "⚠️ IAM 바인딩 실패: ${ROLE} (권한 부족 — 프로젝트 소유자가 수동 설정 필요)"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "IAM 바인딩 결과: 기존=${SKIPPED}, 추가=${ADDED}, 실패=${FAILED}"
          if [ $FAILED -gt 0 ] && [ $SKIPPED -eq 0 ] && [ $ADDED -eq 0 ]; then
            echo "::warning::모든 IAM 바인딩이 실패했습니다. 프로젝트 소유자가 수동으로 IAM 바인딩을 설정해야 합니다. --force 플래그로 배포를 계속 진행합니다."
          fi

      - name: Firebase Functions 배포
        if: steps.detect.outputs.deploy_functions == 'true'
        run: firebase deploy --only functions --project ${{ env.FIREBASE_PROJECT }} --force

      - name: Firebase 클라이언트 설정 생성 (firebase-config.js)
        if: steps.detect.outputs.deploy_hosting == 'true'
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: |
          cat > firebase-config.js <<JSEOF
          var __FIREBASE_CONFIG = {
              apiKey: "${FIREBASE_WEB_API_KEY}",
              authDomain: "levelup-app-53d02.firebaseapp.com",
              projectId: "levelup-app-53d02",
              storageBucket: "levelup-app-53d02.firebasestorage.app",
              messagingSenderId: "233040099152",
              appId: "1:233040099152:web:82310514d26c8c6d52de55",
              measurementId: "G-4DBGG03CCJ"
          };
          JSEOF
          sed -i 's/^[[:space:]]*//' firebase-config.js
          cp firebase-config.js www/firebase-config.js
          echo "✅ firebase-config.js 생성 완료"

      - name: firebase-config.js API 키 검증
        if: steps.detect.outputs.deploy_hosting == 'true'
        run: |
          if grep -q 'apiKey: ""' www/firebase-config.js; then
            echo "::error::FIREBASE_WEB_API_KEY secret이 비어있습니다! firebase-config.js에 빈 apiKey가 포함되어 있습니다."
            exit 1
          fi
          echo "✅ firebase-config.js API 키 검증 완료"

      - name: push-test.html 동기화 (root → www)
        if: steps.detect.outputs.deploy_hosting == 'true'
        run: |
          if [ -f push-test.html ]; then
            cp push-test.html www/push-test.html
            echo "root push-test.html → www/push-test.html 동기화 완료"
          fi

      - name: Firebase Hosting 배포
        if: steps.detect.outputs.deploy_hosting == 'true'
        run: firebase deploy --only hosting --project ${{ env.FIREBASE_PROJECT }}

      - name: Firestore Rules & Indexes 배포
        if: steps.detect.outputs.deploy_firestore == 'true'
        run: firebase deploy --only firestore --project ${{ env.FIREBASE_PROJECT }}

      - name: 배포 결과 요약
        if: always()
        run: |
          echo "## Firebase 배포 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 대상 | 상태 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.detect.outputs.deploy_functions }}" = "true" ]; then
            echo "| Cloud Functions | 배포됨 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Cloud Functions | 건너뜀 (변경 없음) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.detect.outputs.deploy_hosting }}" = "true" ]; then
            echo "| Hosting (www) | 배포됨 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Hosting (www) | 건너뜀 (변경 없음) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.detect.outputs.deploy_firestore }}" = "true" ]; then
            echo "| Firestore Rules | 배포됨 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Firestore Rules | 건너뜀 (변경 없음) |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "커밋: \`$(git rev-parse --short HEAD)\` | 브랜치: \`${{ github.ref_name }}\` | 실행자: \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
