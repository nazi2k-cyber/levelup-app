name: Firebase Functions & Hosting 배포

on:
  push:
    branches: [ "main" ]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'storage.rules'
      - 'cors.json'
      - 'www/**'
      - 'push-test.html'
      - 'cors.json'
      - 'storage.rules'
      - 'app.js'
      - 'sw.js'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '배포 대상'
        required: true
        type: choice
        options:
          - auto
          - all
          - functions
          - hosting
          - firestore
          - storage
        default: 'auto'

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Node.js 셋업
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Google 서비스 계정 인증
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Firebase CLI 설치
        run: npm install -g firebase-tools

      - name: Storage CORS 설정 적용
        continue-on-error: true
        run: |
          if [ -f cors.json ]; then
            BUCKET="levelup-app-53d02.firebasestorage.app"
            echo "Applying CORS to gs://${BUCKET} ..."
            gsutil cors set cors.json "gs://${BUCKET}" && echo "CORS 설정 완료: ${BUCKET}" || echo "::warning::CORS 설정 실패 — Firebase Console에서 수동 확인 필요"
          fi

      - name: 변경된 파일 감지 및 배포 대상 결정
        id: detect
        run: |
          MANUAL_TARGET="${{ github.event.inputs.deploy_target }}"

          if [ "$MANUAL_TARGET" = "all" ]; then
            echo "deploy_functions=true" >> "$GITHUB_OUTPUT"
            echo "deploy_hosting=true" >> "$GITHUB_OUTPUT"
            echo "deploy_firestore=true" >> "$GITHUB_OUTPUT"
            echo "deploy_storage=true" >> "$GITHUB_OUTPUT"
            echo "전체 배포 (수동 선택)"
            exit 0
          fi

          if [ "$MANUAL_TARGET" = "functions" ]; then
            echo "deploy_functions=true" >> "$GITHUB_OUTPUT"
            echo "deploy_hosting=false" >> "$GITHUB_OUTPUT"
            echo "deploy_firestore=false" >> "$GITHUB_OUTPUT"
            echo "deploy_storage=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$MANUAL_TARGET" = "hosting" ]; then
            echo "deploy_functions=false" >> "$GITHUB_OUTPUT"
            echo "deploy_hosting=true" >> "$GITHUB_OUTPUT"
            echo "deploy_firestore=false" >> "$GITHUB_OUTPUT"
            echo "deploy_storage=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$MANUAL_TARGET" = "firestore" ]; then
            echo "deploy_functions=false" >> "$GITHUB_OUTPUT"
            echo "deploy_hosting=false" >> "$GITHUB_OUTPUT"
            echo "deploy_firestore=true" >> "$GITHUB_OUTPUT"
            echo "deploy_storage=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$MANUAL_TARGET" = "storage" ]; then
            echo "deploy_functions=false" >> "$GITHUB_OUTPUT"
            echo "deploy_hosting=false" >> "$GITHUB_OUTPUT"
            echo "deploy_firestore=false" >> "$GITHUB_OUTPUT"
            echo "deploy_storage=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # auto: 변경된 파일 기반으로 판단
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "변경된 파일:"
          echo "$CHANGED"

          DEPLOY_FUNCTIONS=false
          DEPLOY_HOSTING=false
          DEPLOY_FIRESTORE=false
          DEPLOY_STORAGE=false

          if echo "$CHANGED" | grep -qE '^functions/'; then
            DEPLOY_FUNCTIONS=true
          fi
          if echo "$CHANGED" | grep -qE '^(www/|push-test\.html|app\.js|sw\.js)'; then
            DEPLOY_HOSTING=true
          fi
          if echo "$CHANGED" | grep -qE '^storage\.rules'; then
            DEPLOY_STORAGE=true
          fi
          if echo "$CHANGED" | grep -qE '^(firestore\.rules|firestore\.indexes\.json)'; then
            DEPLOY_FIRESTORE=true
          fi
          if echo "$CHANGED" | grep -qE '^(storage\.rules|cors\.json)'; then
            DEPLOY_STORAGE=true
          fi
          if echo "$CHANGED" | grep -qE '^firebase\.json'; then
            DEPLOY_FUNCTIONS=true
            DEPLOY_HOSTING=true
            DEPLOY_FIRESTORE=true
            DEPLOY_STORAGE=true
          fi

          # workflow_dispatch(auto)에서 변경 감지 실패 시 전체 배포
          if [ "$DEPLOY_FUNCTIONS" = "false" ] && [ "$DEPLOY_HOSTING" = "false" ] && [ "$DEPLOY_FIRESTORE" = "false" ] && [ "$DEPLOY_STORAGE" = "false" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              DEPLOY_FUNCTIONS=true
              DEPLOY_HOSTING=true
              DEPLOY_FIRESTORE=true
              DEPLOY_STORAGE=true
            fi
          fi

          echo "deploy_functions=$DEPLOY_FUNCTIONS" >> "$GITHUB_OUTPUT"
          echo "deploy_hosting=$DEPLOY_HOSTING" >> "$GITHUB_OUTPUT"
          echo "deploy_firestore=$DEPLOY_FIRESTORE" >> "$GITHUB_OUTPUT"
          echo "deploy_storage=$DEPLOY_STORAGE" >> "$GITHUB_OUTPUT"
          echo "Functions=$DEPLOY_FUNCTIONS, Hosting=$DEPLOY_HOSTING, Firestore=$DEPLOY_FIRESTORE, Storage=$DEPLOY_STORAGE"

      - name: Functions 의존성 설치
        if: steps.detect.outputs.deploy_functions == 'true'
        run: cd functions && npm ci

      - name: 고아 함수 정리 (sendRaidAlerts — scheduler job 누락)
        if: steps.detect.outputs.deploy_functions == 'true'
        continue-on-error: true
        run: |
          gcloud functions delete sendRaidAlerts --region=asia-northeast3 --gen2 --quiet 2>/dev/null || true
          gcloud scheduler jobs delete firebase-schedule-sendRaidAlerts-asia-northeast3 --location=asia-northeast3 --quiet 2>/dev/null || true

      - name: Firebase Functions 배포
        if: steps.detect.outputs.deploy_functions == 'true'
        run: firebase deploy --only functions --force

      - name: root → www 파일 동기화
        if: steps.detect.outputs.deploy_hosting == 'true'
        run: |
          for f in push-test.html app.js sw.js; do
            if [ -f "$f" ]; then
              cp "$f" "www/$f"
              echo "$f → www/$f 동기화 완료"
            fi
          done

      - name: Firebase Hosting 배포
        if: steps.detect.outputs.deploy_hosting == 'true'
        run: firebase deploy --only hosting

      - name: Storage CORS 설정 배포
        if: steps.detect.outputs.deploy_storage == 'true'
        run: |
          echo "Applying CORS configuration to Storage bucket..."
          gsutil cors set cors.json gs://levelup-app-53d02.firebasestorage.app


      - name: Storage Rules 배포
        if: steps.detect.outputs.deploy_storage == 'true'
        run: firebase deploy --only storage

      - name: Firestore Rules & Indexes 배포
        if: steps.detect.outputs.deploy_firestore == 'true'
        run: firebase deploy --only firestore

      - name: 배포 결과 요약
        if: always()
        run: |
          echo "## Firebase 배포 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 대상 | 상태 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.detect.outputs.deploy_functions }}" = "true" ]; then
            echo "| Cloud Functions | 배포됨 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Cloud Functions | 건너뜀 (변경 없음) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.detect.outputs.deploy_hosting }}" = "true" ]; then
            echo "| Hosting (www) | 배포됨 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Hosting (www) | 건너뜀 (변경 없음) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.detect.outputs.deploy_firestore }}" = "true" ]; then
            echo "| Firestore Rules | 배포됨 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Firestore Rules | 건너뜀 (변경 없음) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.detect.outputs.deploy_storage }}" = "true" ]; then
            echo "| Storage (CORS + Rules) | 배포됨 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Storage (CORS + Rules) | 건너뜀 (변경 없음) |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "커밋: \`$(git rev-parse --short HEAD)\` | 브랜치: \`${{ github.ref_name }}\` | 실행자: \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
