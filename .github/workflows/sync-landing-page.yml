name: 랜딩페이지 양방향 동기화

on:
  push:
    branches: ['**']
    paths:
      - 'www/index.html'
      - 'www/intro-style.css'
      - 'docs/index.html'
      - 'docs/intro-style.css'

jobs:
  sync:
    # [skip-sync] 태그가 있는 커밋(이 워크플로가 생성한 커밋)은 건너뜀 → 무한루프 방지
    if: "!contains(github.event.head_commit.message, '[skip-sync]')"
    runs-on: ubuntu-latest

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 변경 파일 감지 및 동기화
        id: sync
        run: |
          # HEAD~1이 없는 경우(최초 커밋 등) 빈 문자열로 폴백
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "변경된 파일:"
          echo "$CHANGED"

          SYNCED=false

          for FILE in "index.html" "intro-style.css"; do
            WWW_CHANGED=$(echo "$CHANGED" | grep -c "^www/${FILE}$" || true)
            DOCS_CHANGED=$(echo "$CHANGED" | grep -c "^docs/${FILE}$" || true)

            if [ "$WWW_CHANGED" -gt 0 ] && [ "$DOCS_CHANGED" -eq 0 ]; then
              echo "✅ www/${FILE} → docs/${FILE}"
              cp "www/${FILE}" "docs/${FILE}"
              SYNCED=true
            elif [ "$DOCS_CHANGED" -gt 0 ] && [ "$WWW_CHANGED" -eq 0 ]; then
              echo "✅ docs/${FILE} → www/${FILE}"
              cp "docs/${FILE}" "www/${FILE}"
              SYNCED=true
            elif [ "$WWW_CHANGED" -gt 0 ] && [ "$DOCS_CHANGED" -gt 0 ]; then
              echo "::warning::${FILE}: 양쪽 동시 변경 감지 — www/를 소스로 동기화합니다."
              cp "www/${FILE}" "docs/${FILE}"
              SYNCED=true
            fi
          done

          echo "synced=$SYNCED" >> "$GITHUB_OUTPUT"

      - name: 동기화 결과 커밋 & 푸시
        if: steps.sync.outputs.synced == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add www/index.html www/intro-style.css docs/index.html docs/intro-style.css

          if git diff --cached --quiet; then
            echo "이미 동기화 상태 — 커밋 불필요"
          else
            git commit -m "chore: 랜딩페이지 양방향 동기화 [skip-sync]"
            git push
          fi

      - name: 동기화 요약
        if: always()
        run: |
          echo "## 랜딩페이지 동기화 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.sync.outputs.synced }}" = "true" ]; then
            echo "✅ 동기화 완료" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ 동기화 불필요 (이미 일치하거나 변경 없음)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "커밋: \`$(git rev-parse --short HEAD)\` | 브랜치: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
