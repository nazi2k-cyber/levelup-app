name: Android APK 자동 빌드

on:
  push:
    branches: [ "main", "claude/**" ]
  workflow_dispatch:  # 수동 트리거 허용

jobs:
  build:
    runs-on: ubuntu-22.04  # Android SDK 사전 설치된 안정적 환경

    steps:
      # 1. 소스코드 체크아웃
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # 2. Node.js 환경 셋업
      - name: Node.js 셋업
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Java 17 환경 셋업 (Android 빌드 필수)
      - name: Java 17 셋업
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Android SDK 환경변수 확인 및 설정 (ubuntu-22.04 사전 설치)
      - name: Android SDK 환경변수 설정
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      # 4-1. 고정 디버그 키스토어 복원 (SHA-1 일관성 → Google 로그인 안정화)
      #       GitHub Secrets에 DEBUG_KEYSTORE_BASE64를 설정하면 매 빌드마다 동일한
      #       SHA-1이 사용되어 Firebase Console 재등록 불필요.
      #       생성 방법: base64 -w 0 ~/.android/debug.keystore > keystore.b64
      - name: 디버그 키스토어 복원
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            mkdir -p ~/.android
            echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
            echo "✅ 고정 디버그 키스토어 복원 완료 (SHA-1 동일)"
          else
            echo "ℹ️ DEBUG_KEYSTORE_BASE64 시크릿 미설정"
            echo "   → 기본 debug.keystore 사용 (SHA-1이 빌드마다 변경됨)"
            echo "   → Google 로그인 오류 코드 10 발생 시 Firebase Console에 새 SHA-1 등록 필요"
          fi

      # 5. npm 패키지 설치 (lock 파일 기준 정확한 버전 설치)
      - name: npm 패키지 설치
        run: npm ci

      # 6. 웹 파일을 www/ 디렉토리로 복사 (Capacitor webDir 요구사항)
      - name: 웹 빌드 디렉토리 준비
        run: |
          mkdir -p www
          cp index.html app.js style.css data.js logger.js www/

      # 6-1. Google OAuth Web Client ID를 capacitor.config.json에 주입
      - name: Google Web Client ID 주입
        if: env.GOOGLE_WEB_CLIENT_ID != ''
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          sed -i "s|233040099152-REPLACE_WITH_WEB_CLIENT_HASH.apps.googleusercontent.com|$GOOGLE_WEB_CLIENT_ID|g" capacitor.config.json

      # 7. Android 플랫폼 추가 (android/ 폴더가 없을 때 자동 생성)
      - name: Android 플랫폼 추가
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "android 디렉토리가 이미 존재합니다. 스킵합니다."
          fi
        env:
          CI: true

      # 7-1. google-services.json 배치 (Android Google Sign-In 필수)
      - name: google-services.json 배치
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # 시크릿이 올바른 패키지명을 포함하면 사용, 아니면 저장소의 템플릿 사용
          if [ -n "$GOOGLE_SERVICES_JSON" ] && echo "$GOOGLE_SERVICES_JSON" | grep -q '"com.levelup.reboot"' && echo "$GOOGLE_SERVICES_JSON" | grep -q '"project_info"'; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ GOOGLE_SERVICES_JSON 시크릿 사용 (패키지명 및 표준 필드 확인됨)"
          else
            cp google-services.json android/app/google-services.json
            echo "ℹ️ 저장소의 google-services.json 사용"
          fi

      # 8. 웹 소스를 Android 프로젝트에 동기화
      - name: 웹→Android 동기화
        run: npx cap sync android
        env:
          CI: true

      # 8. Gradle 래퍼 실행 권한 부여
      - name: Gradle 실행 권한 부여
        run: chmod +x android/gradlew

      # 9. Debug APK 빌드
      - name: APK 빌드 (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # 9-1. 디버그 키스토어 SHA-1 출력 및 Firebase 등록 안내
      - name: SHA-1 지문 출력 (Firebase 등록용)
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          echo "================================================"
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "🔑 키스토어: GitHub Secrets (DEBUG_KEYSTORE_BASE64) 사용 - SHA-1 고정됨"
          else
            echo "⚠️  키스토어: 랜덤 생성 - SHA-1이 이 빌드에서만 유효합니다!"
            echo "   Google 로그인 코드 10 방지를 위해 DEBUG_KEYSTORE_BASE64 시크릿 설정을 권장합니다."
          fi
          echo "------------------------------------------------"
          SHA1=$(cd android && ./gradlew signingReport 2>/dev/null | grep -A5 "Variant: debug" | grep "SHA1:" | head -1 | awk '{print $2}')
          echo "📋 이 빌드 SHA-1: $SHA1"
          echo "   Firebase Console > 프로젝트 설정 > 앱 > 디지털 지문에 등록하세요."
          echo "================================================"
          # GitHub Summary에도 출력
          echo "## 🔑 APK 서명 SHA-1" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "✅ **고정 키스토어 사용** (DEBUG_KEYSTORE_BASE64 시크릿)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **랜덤 키스토어** - 이 SHA-1은 이 빌드에서만 유효" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$SHA1" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Firebase Console > 프로젝트 설정 > 앱 > 디지털 지문 추가에 등록" >> $GITHUB_STEP_SUMMARY

      # 10. 빌드된 APK 파일을 Artifact로 업로드
      - name: APK 업로드 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: levelup-reboot-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 11. 빌드 결과 요약 출력
      - name: 빌드 결과 요약
        if: success()
        run: |
          echo "✅ APK 빌드 성공!"
          echo "📦 파일 위치: android/app/build/outputs/apk/debug/app-debug.apk"
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
          echo "## ✅ APK 빌드 성공" >> $GITHUB_STEP_SUMMARY
          echo "파일: \`android/app/build/outputs/apk/debug/app-debug.apk\`" >> $GITHUB_STEP_SUMMARY
