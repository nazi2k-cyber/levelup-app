name: Android APK 자동 빌드

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # 수동 트리거 허용

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # 2. Node.js 환경 셋업
      - name: Node.js 셋업
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Java 17 환경 셋업 (Android 빌드 필수)
      - name: Java 17 셋업
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Android SDK 셋업
      - name: Android SDK 셋업
        uses: android-actions/setup-android@v3

      # 5. npm 패키지 설치 (Capacitor CLI 포함)
      - name: npm 패키지 설치
        run: npm install

      # 6. Android 플랫폼 추가 (android/ 폴더가 없을 때 자동 생성)
      - name: Android 플랫폼 추가
        run: npx cap add android

      # 7. 웹 소스를 Android 프로젝트에 동기화
      - name: 웹→Android 동기화
        run: npx cap sync android

      # 8. Gradle 래퍼 실행 권한 부여
      - name: Gradle 실행 권한 부여
        run: chmod +x android/gradlew

      # 9. Debug APK 빌드
      - name: APK 빌드 (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # 10. 빌드된 APK 파일을 Artifact로 업로드
      - name: APK 업로드 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: levelup-reboot-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 11. 빌드 결과 요약 출력
      - name: 빌드 결과 요약
        if: success()
        run: |
          echo "✅ APK 빌드 성공!"
          echo "📦 파일 위치: android/app/build/outputs/apk/debug/app-debug.apk"
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
