name: Android APK 자동 빌드

on:
  push:
    branches: [ "main", "claude/**" ]
  workflow_dispatch:  # 수동 트리거 허용

jobs:
  build:
    runs-on: ubuntu-22.04  # Android SDK 사전 설치된 안정적 환경

    steps:
      # 1. 소스코드 체크아웃
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # 2. Node.js 환경 셋업
      - name: Node.js 셋업
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Java 17 환경 셋업 (Android 빌드 필수)
      - name: Java 17 셋업
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Android SDK 환경변수 확인 및 설정 (ubuntu-22.04 사전 설치)
      - name: Android SDK 환경변수 설정
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      # 5. npm 패키지 설치 (lock 파일 기준 정확한 버전 설치)
      - name: npm 패키지 설치
        run: npm ci

      # 6. 웹 파일을 www/ 디렉토리로 복사 (Capacitor webDir 요구사항)
      - name: 웹 빌드 디렉토리 준비
        run: |
          mkdir -p www
          cp index.html app.js style.css data.js www/

      # 7. Android 플랫폼 추가 (android/ 폴더가 없을 때 자동 생성)
      - name: Android 플랫폼 추가
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "android 디렉토리가 이미 존재합니다. 스킵합니다."
          fi
        env:
          CI: true

      # 8. 웹 소스를 Android 프로젝트에 동기화
      - name: 웹→Android 동기화
        run: npx cap sync android
        env:
          CI: true

      # 8. Gradle 래퍼 실행 권한 부여
      - name: Gradle 실행 권한 부여
        run: chmod +x android/gradlew

      # 9. Debug APK 빌드
      - name: APK 빌드 (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # 10. 빌드된 APK 파일을 Artifact로 업로드
      - name: APK 업로드 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: levelup-reboot-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 11. 빌드 결과 요약 출력
      - name: 빌드 결과 요약
        if: success()
        run: |
          echo "✅ APK 빌드 성공!"
          echo "📦 파일 위치: android/app/build/outputs/apk/debug/app-debug.apk"
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
