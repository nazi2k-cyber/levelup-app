name: Android APK 자동 빌드

on:
  push:
    branches: [ "main", "claude/**" ]
  workflow_dispatch:  # 수동 트리거 허용

jobs:
  build:
    runs-on: ubuntu-22.04  # Android SDK 사전 설치된 안정적 환경

    steps:
      # 1. 소스코드 체크아웃
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # 2. Node.js 환경 셋업
      - name: Node.js 셋업
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Java 17 환경 셋업 (Android 빌드 필수)
      - name: Java 17 셋업
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Android SDK 환경변수 확인 및 설정 (ubuntu-22.04 사전 설치)
      - name: Android SDK 환경변수 설정
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      # 4-1. 고정 debug keystore 준비 (SHA-1 완전 고정)
      - name: 디버그 키스토어 준비
        run: |
          # 레이어 1: Gradle이 debug.keystore를 찾는 모든 기본 경로에 배치
          # - ~/.android/debug.keystore  (전통적 경로)
          # - ~/.config/.android/debug.keystore  (XDG 경로, ubuntu runner 실제 사용 경로)
          mkdir -p ~/.android ~/.config/.android
          base64 -d debug-keystore.b64 > ~/.android/debug.keystore
          cp ~/.android/debug.keystore ~/.config/.android/debug.keystore

          SHA1=$(keytool -list -v -keystore ~/.android/debug.keystore -storepass android 2>/dev/null | grep "SHA1:" | head -1 | awk '{print $2}')
          if [ -z "$SHA1" ]; then
            echo "❌ 키스토어 복원 실패"
            exit 1
          fi
          echo "✅ 키스토어 배치 완료"
          echo "   ~/.android/debug.keystore → SHA-1: $SHA1"
          echo "   ~/.config/.android/debug.keystore → 동일 파일"
          # 이후 단계에서 비교 검증에 사용
          echo "EXPECTED_SHA1=$SHA1" >> $GITHUB_ENV

      # 5. npm 패키지 설치 (lock 파일 기준 정확한 버전 설치)
      - name: npm 패키지 설치
        run: npm ci

      # 6. 웹 파일을 www/ 디렉토리로 복사 (Capacitor webDir 요구사항)
      - name: 웹 빌드 디렉토리 준비
        run: |
          mkdir -p www
          cp index.html app.js style.css data.js logger.js www/

      # 6-1. Google OAuth Web Client ID를 capacitor.config.json에 주입
      - name: Google Web Client ID 주입
        if: env.GOOGLE_WEB_CLIENT_ID != ''
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          sed -i "s|233040099152-REPLACE_WITH_WEB_CLIENT_HASH.apps.googleusercontent.com|$GOOGLE_WEB_CLIENT_ID|g" capacitor.config.json

      # 7. Android 플랫폼 추가 (android/ 폴더가 없을 때 자동 생성)
      - name: Android 플랫폼 추가
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "android 디렉토리가 이미 존재합니다. 스킵합니다."
          fi
        env:
          CI: true

      # 7-1. google-services.json 배치 (Android Google Sign-In 필수)
      - name: google-services.json 배치
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "❌ GOOGLE_SERVICES_JSON 시크릿이 설정되지 않았습니다."
            echo "   GitHub Secrets에 GOOGLE_SERVICES_JSON을 등록하세요."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          echo "✅ google-services.json 복원 완료"

      # 8. 웹 소스를 Android 프로젝트에 동기화
      - name: 웹→Android 동기화
        run: npx cap sync android
        env:
          CI: true

      # 8-1. build.gradle에 고정 서명 설정 주입 (Gradle 기본 키스토어 우선순위 무시)
      - name: build.gradle 서명 설정 주입
        run: |
          cp ~/.android/debug.keystore android/app/debug.keystore
          python3 << 'PYEOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_block = '''    signingConfigs {
              debug {
                  storeFile file("debug.keystore")
                  storePassword "android"
                  keyAlias "androiddebugkey"
                  keyPassword "android"
              }
          }
          '''

          # signingConfigs 블록이 없으면 buildTypes 앞에 삽입
          if 'signingConfigs' not in content:
              content = content.replace('    buildTypes {', signing_block + '    buildTypes {')

          # buildTypes 내부의 debug 블록에만 signingConfig 추가
          # buildTypes 위치를 찾아서 그 이후의 debug 블록에만 적용
          if 'signingConfig signingConfigs.debug' not in content:
              bt_match = re.search(r'buildTypes\s*\{', content)
              if bt_match:
                  bt_pos = bt_match.end()
                  after_bt = content[bt_pos:]
                  debug_match = re.search(r'(debug\s*\{)', after_bt)
                  if debug_match:
                      insert_pos = bt_pos + debug_match.end()
                      content = content[:insert_pos] + '\n            signingConfig signingConfigs.debug' + content[insert_pos:]
                  else:
                      # debug 블록이 없으면 buildTypes 안에 새로 생성
                      content = content[:bt_pos] + '\n        debug {\n            signingConfig signingConfigs.debug\n        }\n' + content[bt_pos:]

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("✅ build.gradle 서명 설정 주입 완료")
          PYEOF

          echo "--- build.gradle 서명 관련 설정 확인 ---"
          grep -n "signingConfig\|signingConfigs\|storeFile" android/app/build.gradle || echo "서명 설정 없음"

      # 8-2. Gradle 래퍼 실행 권한 부여
      - name: Gradle 실행 권한 부여
        run: chmod +x android/gradlew

      # 8-3. 빌드 전 SHA-1 사전 검증 (레이어 3: 불일치 시 즉시 실패)
      - name: 서명 키 사전 검증
        run: |
          ACTUAL_SHA1=$(cd android && ./gradlew signingReport 2>/dev/null \
            | grep -A5 "Variant: debug" | grep "SHA1:" | head -1 | awk '{print $2}')
          echo "예상 SHA-1: $EXPECTED_SHA1"
          echo "실제 SHA-1: $ACTUAL_SHA1"
          if [ "$ACTUAL_SHA1" != "$EXPECTED_SHA1" ]; then
            echo "❌ SHA-1 불일치 — build.gradle 서명 주입 실패"
            echo "   Gradle이 우리 keystore가 아닌 다른 keystore를 사용 중입니다."
            exit 1
          fi
          echo "✅ SHA-1 일치 — 서명 키 고정 확인됨"

      # 9. Debug APK 빌드
      - name: APK 빌드 (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # 9-1. SHA-1 일치 여부 검증 (google-services.json ↔ APK 서명)
      - name: SHA-1 검증 및 지문 출력
        run: |
          echo "================================================"
          SHA1=$(cd android && ./gradlew signingReport 2>/dev/null | grep -A5 "Variant: debug" | grep "SHA1:" | head -1 | awk '{print $2}')
          SHA1_LOWER=$(echo "$SHA1" | tr '[:upper:]' '[:lower:]' | tr -d ':')
          echo "📋 APK 서명 SHA-1: $SHA1"

          echo "📄 google-services.json certificate_hash 목록:"
          HASHES=$(grep -o '"certificate_hash": *"[^"]*"' android/app/google-services.json | grep -o '[0-9a-f]\{40\}')
          echo "$HASHES"

          if echo "$HASHES" | grep -q "$SHA1_LOWER"; then
            echo "✅ SHA-1 일치 확인"
            MATCH="✅ 일치"
          else
            echo "❌ SHA-1 불일치 — GOOGLE_SERVICES_JSON 시크릿을 Firebase Console에서 재다운로드하여 업데이트하세요"
            MATCH="❌ 불일치"
          fi
          echo "================================================"

          echo "## 🔑 Google Sign-In SHA-1 검증" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| APK 서명 SHA-1 | \`$SHA1\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA-1 일치 여부 | $MATCH |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '**google-services.json certificate_hash 목록:**' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$HASHES" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # 10. 빌드된 APK 파일을 Artifact로 업로드
      - name: APK 업로드 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: levelup-reboot-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 11. 빌드 결과 요약 출력
      - name: 빌드 결과 요약
        if: success()
        run: |
          echo "✅ APK 빌드 성공!"
          echo "📦 파일 위치: android/app/build/outputs/apk/debug/app-debug.apk"
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
          echo "## ✅ APK 빌드 성공" >> $GITHUB_STEP_SUMMARY
          echo "파일: \`android/app/build/outputs/apk/debug/app-debug.apk\`" >> $GITHUB_STEP_SUMMARY
