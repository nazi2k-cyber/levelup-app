name: Android APK 자동 빌드

on:
  push:
    branches: [ "claude/**" ]       # main은 auto-version 완료 후 workflow_run으로 트리거
  workflow_run:
    workflows: [ "자동 버전 관리" ]   # auto-version.yml 완료 후 빌드 (버전 일치 보장)
    types: [ completed ]
  workflow_dispatch:  # 수동 트리거 허용

permissions:
  contents: write  # 빌드 아티팩트 및 태그 push에 필요

jobs:
  build:
    # 이벤트 타입별 빌드 조건:
    # - workflow_run: auto-version 성공 시에만 빌드 (auto-version이 [skip ci] 처리 담당)
    #   주의: head_commit.message 체크 불가 — auto-version이 [skip ci] 커밋을 push하므로
    #         head_commit이 항상 [skip ci]를 포함하게 되어 빌드가 영구 스킵됨
    # - push: claude/** 브랜치용 ([skip ci] 커밋 스킵)
    # - workflow_dispatch: 항상 실행
    if: >-
      (github.event_name == 'workflow_run'
       && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'push'
       && !contains(github.event.head_commit.message, '[skip ci]')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04  # Android SDK 사전 설치된 안정적 환경

    steps:
      # 1. 소스코드 체크아웃
      # workflow_run 시 github.sha는 bump 전 커밋을 가리키므로 main HEAD를 명시적으로 체크아웃
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 전체 이력 — 버전 태그 감지에 필요
          ref: ${{ github.event_name == 'workflow_run' && 'main' || '' }}

      # 2. Node.js 환경 셋업
      - name: Node.js 셋업
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      # 3. Java 17 환경 셋업 (Android 빌드 필수)
      - name: Java 17 셋업
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Android SDK 환경변수 확인 및 설정 (ubuntu-22.04 사전 설치)
      - name: Android SDK 환경변수 설정
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      # 4-1. 고정 디버그 키스토어 복원 (GitHub Secret DEBUG_KEYSTORE_BASE64 사용)
      #       SHA-1 고정: 00:93:73:FD:F7:90:AF:07:6E:49:EA:D5:DB:68:44:70:82:EF:9D:20
      - name: 디버그 키스토어 복원
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          if [ -z "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "❌ DEBUG_KEYSTORE_BASE64 시크릿이 설정되지 않았습니다."
            echo "   GitHub 저장소 → Settings → Secrets → DEBUG_KEYSTORE_BASE64 를 등록하세요."
            exit 1
          fi
          echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
          echo "✅ 고정 디버그 키스토어 복원 완료 (GitHub Secret 사용)"
          keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android 2>/dev/null | grep -E "SHA[-]?1:"

      # 4-2. VERSION 파일에서 버전 읽기
      - name: 버전 정보 읽기
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 현재 앱 버전: $VERSION"

      # 4-3. 버전 동기화 (package.json, sw.js 등)
      - name: 버전 동기화
        run: bash scripts/version-bump.sh

      # 4-4. Gradle versionName 주입 (APK 내부 버전을 VERSION 파일과 일치)
      - name: Gradle 버전 정보 주입
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_GRADLE="android/app/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION}\"/" "$BUILD_GRADLE"
            echo "✅ versionName → ${VERSION}"
            grep -E "versionName" "$BUILD_GRADLE"
          else
            echo "ℹ️ android/app/build.gradle 아직 없음 (cap add 이후 적용)"
          fi

      # 5. npm 패키지 설치 (lock 파일 기준 정확한 버전 설치)
      - name: npm 패키지 설치
        run: npm ci

      # 6-2. Firebase 클라이언트 설정 생성 (firebase-config.js — API 키 런타임 주입)
      - name: Firebase 클라이언트 설정 생성 (firebase-config.js)
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_APPCHECK_DEBUG_TOKEN: ${{ secrets.FIREBASE_APPCHECK_DEBUG_TOKEN }}
        run: |
          if [ -z "$FIREBASE_WEB_API_KEY" ]; then
            echo "⚠️ FIREBASE_WEB_API_KEY 시크릿이 설정되지 않았습니다."
            echo "   Firebase Console → 프로젝트 설정 → 웹 앱 → apiKey 값을 GitHub Secrets에 등록하세요."
            exit 1
          fi
          npm run generate-config
          echo "✅ www/firebase-config.js 생성 완료"

      # 7. 웹 빌드 디렉토리 준비 (Capacitor 엔트리포인트 오버라이드)
      - name: 웹 빌드 디렉토리 준비
        run: |
          # Capacitor는 www/index.html을 엔트리포인트로 사용 — app.html 내용으로 오버라이드
          cp www/app.html www/index.html

      # 6-1. Google OAuth Web Client ID를 capacitor.config.json에 주입
      - name: Google Web Client ID 주입
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          if [ -z "$GOOGLE_WEB_CLIENT_ID" ]; then
            echo "❌ GOOGLE_WEB_CLIENT_ID 시크릿이 설정되지 않았습니다."
            echo "   Firebase Console → 인증 → 로그인 방법 → Google → 웹 SDK 구성 → 웹 클라이언트 ID 값을"
            echo "   GitHub Secrets에 GOOGLE_WEB_CLIENT_ID로 등록하세요."
            exit 1
          fi
          sed -i "s|GOOGLE_WEB_CLIENT_ID_PLACEHOLDER|$GOOGLE_WEB_CLIENT_ID|g" capacitor.config.json
          sed -i "s|GOOGLE_WEB_CLIENT_ID_PLACEHOLDER|$GOOGLE_WEB_CLIENT_ID|g" www/app.js
          echo "✅ Google Web Client ID 주입 완료: ${GOOGLE_WEB_CLIENT_ID:0:40}..."

      # 7. Android 플랫폼 추가 (android/ 폴더가 없을 때 자동 생성)
      - name: Android 플랫폼 추가
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "android 디렉토리가 이미 존재합니다. 스킵합니다."
          fi
        env:
          CI: true

      # 7-1. google-services.json 배치 (Android Google Sign-In 필수)
      - name: google-services.json 배치
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # 시크릿이 올바른 패키지명을 포함하면 사용, 아니면 저장소의 템플릿 사용
          if [ -n "$GOOGLE_SERVICES_JSON" ] && echo "$GOOGLE_SERVICES_JSON" | grep -q '"com.levelup.reboot"'; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ GOOGLE_SERVICES_JSON 시크릿 사용 (패키지명 확인됨)"
          elif [ -f "google-services.json" ]; then
            cp google-services.json android/app/google-services.json
            echo "⚠️ 저장소 템플릿 google-services.json 사용 (시크릿 미설정 또는 패키지명 불일치)"
            echo "   → Firebase 콘솔에서 Android 앱(com.levelup.reboot)을 등록 후 시크릿을 업데이트하세요."
          else
            echo "❌ google-services.json을 찾을 수 없습니다."
            echo "   GOOGLE_SERVICES_JSON 시크릿이 설정되지 않았고 저장소에 템플릿도 없습니다."
            echo "   해결 방법:"
            echo "   1. Firebase Console → 프로젝트 설정 → Android 앱(com.levelup.reboot) 등록"
            echo "   2. google-services.json 다운로드"
            echo "   3. GitHub Secrets에 GOOGLE_SERVICES_JSON으로 파일 내용 등록"
            exit 1
          fi

      # 7-2. 네이티브 플러그인 소스 주입 (커스텀 Capacitor 플러그인)
      - name: 네이티브 플러그인 소스 주입
        run: |
          PLUGIN_DIR="android/app/src/main/java/com/levelup/reboot/plugins"
          mkdir -p "$PLUGIN_DIR"
          cp native-plugins/*.java "$PLUGIN_DIR/"
          echo "✅ 네이티브 플러그인 주입 완료:"
          ls -la "$PLUGIN_DIR/"

      # 7-3. 커스텀 앱 아이콘 적용 (res/ 폴더의 levelup 아이콘을 Android mipmap에 복사)
      - name: 커스텀 앱 아이콘 적용
        run: |
          RES_DIR="android/app/src/main/res"

          # 각 해상도별 아이콘 파일 복사
          for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            for icon in levelup.png levelup_foreground.png levelup_background.png levelup_monochrome.png; do
              src="res/mipmap-${density}/${icon}"
              dst="${RES_DIR}/mipmap-${density}/${icon}"
              if [ -f "$src" ]; then
                cp "$src" "$dst"
                echo "  ✅ ${density}/${icon} 복사됨"
              fi
            done
          done

          # adaptive icon XML 복사 (anydpi-v26)
          cp res/mipmap-anydpi-v26/levelup.xml "${RES_DIR}/mipmap-anydpi-v26/levelup.xml"
          echo "  ✅ mipmap-anydpi-v26/levelup.xml 복사됨"

          # AndroidManifest.xml에서 아이콘 참조를 levelup으로 변경
          MANIFEST="${RES_DIR}/../AndroidManifest.xml"
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@mipmap/levelup"|g' "$MANIFEST"
          sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"|android:roundIcon="@mipmap/levelup"|g' "$MANIFEST"
          echo "✅ AndroidManifest.xml 아이콘 참조 업데이트 완료"
          grep -E "android:icon|android:roundIcon" "$MANIFEST"

      # 8. 웹 소스를 Android 프로젝트에 동기화
      - name: 웹→Android 동기화
        run: npx cap sync android
        env:
          CI: true

      # 8-0. Gradle versionName 주입 (cap sync 이후 확정)
      - name: Gradle 버전 정보 주입 (cap sync 이후)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_GRADLE="android/app/build.gradle"
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION}\"/" "$BUILD_GRADLE"
          echo "✅ versionName → ${VERSION}"
          grep -E "versionCode|versionName" "$BUILD_GRADLE"

      # 8-1. AndroidManifest.xml 권한 자동 주입 (GPS + 피트니스)
      - name: Android 권한 자동 주입
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # 위치 권한 주입 (GPS 네이티브 지원)
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "$MANIFEST"
            echo "✅ 위치 권한 (FINE/COARSE_LOCATION) 주입 완료"
          else
            echo "ℹ️ 위치 권한이 이미 존재합니다"
          fi

          # 활동 인식 권한 (Google Fit / Health Connect 걸음 수 데이터)
          if ! grep -q "ACTIVITY_RECOGNITION" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACTIVITY_RECOGNITION" />' "$MANIFEST"
            echo "✅ ACTIVITY_RECOGNITION 권한 주입 완료"
          else
            echo "ℹ️ ACTIVITY_RECOGNITION 권한이 이미 존재합니다"
          fi

          # Health Connect 권한 (Android 14+ 건강 데이터 접근)
          if ! grep -q "health.permission.read.Steps" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.health.READ_STEPS" />' "$MANIFEST"
            echo "✅ Health Connect READ_STEPS 권한 주입 완료"
          else
            echo "ℹ️ Health Connect 권한이 이미 존재합니다"
          fi

          # Google Fit API 접근 권한 (Google Play Services 피트니스)
          if ! grep -q "BODY_SENSORS" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.BODY_SENSORS" />' "$MANIFEST"
            echo "✅ BODY_SENSORS 권한 주입 완료"
          else
            echo "ℹ️ BODY_SENSORS 권한이 이미 존재합니다"
          fi

          # 카메라 권한 (ISBN 바코드 스캔용)
          if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.CAMERA" />' "$MANIFEST"
            echo "✅ CAMERA 권한 주입 완료"
          else
            echo "ℹ️ CAMERA 권한이 이미 존재합니다"
          fi

          # Health Connect intent-filter 주입 (앱이 Health Connect에 연동되도록)
          if ! grep -q "ACTION_SHOW_PERMISSIONS_RATIONALE" "$MANIFEST"; then
            sed -i '/<\/activity>/i\            <intent-filter>\n                <action android:name="androidx.health.ACTION_SHOW_PERMISSIONS_RATIONALE" />\n            </intent-filter>' "$MANIFEST"
            echo "✅ Health Connect intent-filter 주입 완료"
          fi

          # AdMob App ID 메타데이터 주입 (보상형 광고 필수)
          if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" "$MANIFEST"; then
            sed -i '/<\/application>/i\        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-6654057059754695~3529972498" />' "$MANIFEST"
            echo "✅ AdMob App ID 메타데이터 주입 완료"
          else
            echo "ℹ️ AdMob App ID가 이미 존재합니다"
          fi

          echo ""
          echo "📋 최종 AndroidManifest.xml 권한 목록:"
          grep "uses-permission" "$MANIFEST" || true
          echo ""
          grep "intent-filter" "$MANIFEST" || true
          echo ""
          grep "com.google.android.gms.ads" "$MANIFEST" || true

      # 8-0-1. MainActivity.java에 커스텀 플러그인 등록 자동 주입
      - name: 커스텀 플러그인 등록 주입 (MainActivity.java)
        run: |
          MAIN_ACTIVITY="android/app/src/main/java/com/levelup/reboot/MainActivity.java"
          python3 - "$MAIN_ACTIVITY" <<'PYEOF'
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          text = path.read_text()

          imports = [
              'import com.levelup.reboot.plugins.AppSettingsPlugin;',
              'import com.levelup.reboot.plugins.ClipboardPlugin;',
              'import com.levelup.reboot.plugins.FCMPlugin;',
              'import com.levelup.reboot.plugins.GoogleFitPlugin;',
              'import com.levelup.reboot.plugins.HealthConnectPlugin;',
              'import com.levelup.reboot.plugins.NativeAdPlugin;',
          ]

          registers = [
              '        registerPlugin(AppSettingsPlugin.class);',
              '        registerPlugin(ClipboardPlugin.class);',
              '        registerPlugin(FCMPlugin.class);',
              '        registerPlugin(GoogleFitPlugin.class);',
              '        registerPlugin(HealthConnectPlugin.class);',
              '        registerPlugin(NativeAdPlugin.class);',
          ]

          # Ensure android.os.Bundle is imported (needed for onCreate signature)
          if 'import android.os.Bundle;' not in text:
              text = text.replace(
                  'import com.getcapacitor.BridgeActivity;\n',
                  'import android.os.Bundle;\nimport com.getcapacitor.BridgeActivity;\n'
              )

          for imp in imports:
              if imp not in text:
                  text = text.replace(
                      'import com.getcapacitor.BridgeActivity;\n',
                      f'import com.getcapacitor.BridgeActivity;\n{imp}\n'
                  )

          if 'public void onCreate(Bundle savedInstanceState)' in text:
              # onCreate already exists — insert registerPlugin calls after super.onCreate()
              for line in registers:
                  if line not in text:
                      marker = '        super.onCreate(savedInstanceState);\n'
                      if marker in text:
                          text = text.replace(marker, marker + line + '\n', 1)
          else:
              # Capacitor 6 default MainActivity has no onCreate — inject the full method
              missing = [line for line in registers if line not in text]
              if missing:
                  oncreate = (
                      '\n'
                      '    @Override\n'
                      '    public void onCreate(Bundle savedInstanceState) {\n'
                      '        super.onCreate(savedInstanceState);\n'
                      + '\n'.join(missing) + '\n'
                      '    }\n'
                  )
                  last_brace = text.rfind('}')
                  text = text[:last_brace] + oncreate + text[last_brace:]

          path.write_text(text)
          print('MainActivity plugin registration ensured')
          PYEOF
          echo "✅ 플러그인 등록 보강 완료 (AppSettings, Clipboard, FCM, GoogleFit, HealthConnect, NativeAd)"

          echo ""
          echo "📋 최종 MainActivity.java:"
          cat "$MAIN_ACTIVITY"

      # 8-0-2. Health Connect 라이브러리 Gradle 의존성 주입
      - name: Health Connect Gradle 의존성 주입
        run: |
          BUILD_GRADLE="android/app/build.gradle"

          # Health Connect 라이브러리 추가 (가용성 확인용 — 실제 데이터는 REST 폴백)
          if ! grep -q "health.connect" "$BUILD_GRADLE"; then
            sed -i '/^dependencies {/a\    implementation "androidx.health.connect:connect-client:1.1.0-alpha07"' "$BUILD_GRADLE"
            echo "✅ Health Connect 라이브러리 의존성 추가 완료"
          else
            echo "ℹ️ Health Connect 의존성이 이미 존재합니다"
          fi

          # Google Fit SDK 라이브러리 추가 (네이티브 피트니스 데이터 접근)
          # 주의: sed a\ 명령에서 \n은 리터럴로 처리되므로 두 번으로 분리
          if ! grep -q "play-services-fitness" "$BUILD_GRADLE"; then
            sed -i '/^dependencies {/a\    implementation "com.google.android.gms:play-services-fitness:21.2.0"' "$BUILD_GRADLE"
            sed -i '/^dependencies {/a\    implementation "com.google.android.gms:play-services-auth:21.3.0"' "$BUILD_GRADLE"
            echo "✅ Google Fit SDK 의존성 추가 완료"
          else
            echo "ℹ️ Google Fit SDK 의존성이 이미 존재합니다"
          fi

          # Firebase Cloud Messaging 라이브러리 추가 (FCMPlugin 네이티브 푸시 알림)
          if ! grep -q "firebase-messaging" "$BUILD_GRADLE"; then
            sed -i '/^dependencies {/a\    implementation "com.google.firebase:firebase-messaging:24.0.0"' "$BUILD_GRADLE"
            echo "✅ Firebase Messaging 의존성 추가 완료"
          else
            echo "ℹ️ Firebase Messaging 의존성이 이미 존재합니다"
          fi

          # Google AdMob SDK 라이브러리 추가 (보상형 광고)
          if ! grep -q "play-services-ads" "$BUILD_GRADLE"; then
            sed -i '/^dependencies {/a\    implementation "com.google.android.gms:play-services-ads:23.6.0"' "$BUILD_GRADLE"
            echo "✅ AdMob SDK 의존성 추가 완료"
          else
            echo "ℹ️ AdMob SDK 의존성이 이미 존재합니다"
          fi

          # compileSdkVersion을 34 이상으로 업그레이드 (Health Connect 필수)
          if grep -q "compileSdk\s*=\s*3[0-3]" "$BUILD_GRADLE" || grep -q "compileSdkVersion\s*3[0-3]" "$BUILD_GRADLE"; then
            sed -i 's/compileSdk\s*=\s*3[0-3]/compileSdk = 34/' "$BUILD_GRADLE"
            sed -i 's/compileSdkVersion\s*3[0-3]/compileSdkVersion 34/' "$BUILD_GRADLE"
            echo "✅ compileSdkVersion → 34 업그레이드 완료"
          fi

          # targetSdkVersion을 34로 업그레이드
          if grep -q "targetSdk\s*=\s*3[0-3]" "$BUILD_GRADLE" || grep -q "targetSdkVersion\s*3[0-3]" "$BUILD_GRADLE"; then
            sed -i 's/targetSdk\s*=\s*3[0-3]/targetSdk = 34/' "$BUILD_GRADLE"
            sed -i 's/targetSdkVersion\s*3[0-3]/targetSdkVersion 34/' "$BUILD_GRADLE"
            echo "✅ targetSdkVersion → 34 업그레이드 완료"
          fi

          # minSdkVersion을 26 이상으로 업그레이드 (Health Connect 필수)
          # variables.gradle에서 실제 숫자값이 정의됨
          sed -i 's/minSdkVersion\s*=\s*[0-9]\+/minSdkVersion = 26/' android/variables.gradle
          echo "✅ minSdkVersion → 26 업그레이드 완료"

          echo ""
          echo "📋 Gradle dependencies 확인:"
          grep -A 5 "dependencies {" "$BUILD_GRADLE" | head -10

      # 8. Gradle 래퍼 실행 권한 부여
      - name: Gradle 실행 권한 부여
        run: chmod +x android/gradlew

      # 8-1. 고정 keystore로 서명 설정 강제 적용
      - name: Gradle 서명 설정 패치
        run: |
          cp ~/.android/debug.keystore android/app/debug.keystore
          # build.gradle에 명시적 signingConfigs 추가
          cat > /tmp/signing_patch.gradle << 'GRADLEOF'
          signingConfigs {
              debug {
                  storeFile file("debug.keystore")
                  storePassword "android"
                  keyAlias "androiddebugkey"
                  keyPassword "android"
              }
          }
          GRADLEOF
          sed -i '/^android {$/r /tmp/signing_patch.gradle' android/app/build.gradle
          echo "✅ Gradle 서명 설정 패치 완료"
          grep -A 8 'signingConfigs' android/app/build.gradle || true

      # 9. Debug APK 빌드
      - name: APK 빌드 (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # 9-0. APK 파일명에 버전 반영
      - name: APK 파일명 버전 반영
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK_DIR="android/app/build/outputs/apk/debug"
          cp "${APK_DIR}/app-debug.apk" "${APK_DIR}/levelup-reboot-v${VERSION}-debug.apk"
          echo "✅ APK 파일명: levelup-reboot-v${VERSION}-debug.apk"
          ls -lh "${APK_DIR}/"*.apk

      # 9-1. 디버그 키스토어 SHA-1 출력 (Firebase 등록용)
      - name: SHA-1 지문 출력 (Firebase 등록용)
        run: |
          echo "========== APK 서명 SHA-1/SHA-256 지문 =========="
          keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android 2>/dev/null \
            | grep -E "SHA(1|256|[-]?1|[-]?256):" || true
          echo ""
          echo "⚠️  위 SHA-1이 Firebase Console에 등록되어 있어야 Google 로그인이 작동합니다."
          echo "    Firebase Console → 프로젝트 설정 → Android 앱 → SHA 인증서 지문"
          echo "=================================================="

          # Gradle signingReport로도 확인
          cd android
          ./gradlew signingReport 2>/dev/null | grep -E "Variant:|SHA[-]?1:|SHA[-]?256:" || true

          # GitHub Step Summary에 기록
          SHA1=$(keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android 2>/dev/null \
            | grep -E "SHA1:" | awk '{print $2}' | head -1)
          SHA256=$(keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android 2>/dev/null \
            | grep -E "SHA256:" | awk '{print $2}' | head -1)
          {
            echo "## 🔑 APK 서명 지문 (Firebase 등록 필요)"
            echo "| 종류 | 지문 |"
            echo "|------|------|"
            echo "| SHA-1 | \`${SHA1}\` |"
            echo "| SHA-256 | \`${SHA256}\` |"
            echo ""
            echo "> **Google 로그인 오류(코드 10) 발생 시**: Firebase Console → 프로젝트 설정 → Android 앱(com.levelup.reboot) → SHA 인증서 지문에 위 SHA-1을 추가하세요."
          } >> $GITHUB_STEP_SUMMARY

      # 10. 빌드된 APK 파일을 Artifact로 업로드
      - name: APK 업로드 (Artifact)
        uses: actions/upload-artifact@v5
        with:
          name: levelup-reboot-v${{ steps.version.outputs.version }}-debug
          path: android/app/build/outputs/apk/debug/levelup-reboot-v${{ steps.version.outputs.version }}-debug.apk
          retention-days: 30

      # 11. 빌드 결과 요약 출력
      - name: 빌드 결과 요약
        if: success()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "✅ APK 빌드 성공!"
          echo "📦 파일: levelup-reboot-v${VERSION}-debug.apk"
          echo ""
          echo "## ✅ Debug APK 빌드 완료" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 버전 | \`v${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 파일명 | \`levelup-reboot-v${VERSION}-debug.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 아티팩트 | \`levelup-reboot-v${VERSION}-debug\` |" >> $GITHUB_STEP_SUMMARY
