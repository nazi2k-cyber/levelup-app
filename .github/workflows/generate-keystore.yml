name: 릴리즈 키스토어 생성 (최초 1회만 실행)

# ⚠️ 이 워크플로우는 최초 1회만 실행하세요.
# 실행 후 출력된 base64 값을 GitHub Secrets에 저장하고, 이 파일은 삭제하세요.

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: '키스토어 비밀번호 (8자 이상, 기억할 수 있는 값으로 설정)'
        required: true
      key_password:
        description: '키 비밀번호 (8자 이상, 키스토어 비밀번호와 달라도 됨)'
        required: true
      developer_name:
        description: '개발자/회사명 (예: BRAVECAT STUDIOS)'
        required: true
        default: 'BRAVECAT STUDIOS'

jobs:
  generate-keystore:
    runs-on: ubuntu-22.04

    steps:
      - name: Java 17 셋업
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 릴리즈 키스토어 생성
      - name: 릴리즈 키스토어 생성
        run: |
          keytool -genkeypair -v \
            -keystore levelup-release.keystore \
            -alias levelup-key \
            -keyalg RSA -keysize 2048 -validity 25000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=${{ github.event.inputs.developer_name }},O=BRAVECAT,C=KR"
          echo "✅ 키스토어 생성 완료"
          ls -lh levelup-release.keystore

      # 키스토어 정보 출력 (SHA-1 지문 확인용)
      - name: 키스토어 정보 출력
        run: |
          echo "========================================="
          echo "📋 키스토어 인증서 정보"
          echo "========================================="
          keytool -list -v \
            -keystore levelup-release.keystore \
            -alias levelup-key \
            -storepass "${{ github.event.inputs.store_password }}" \
            2>/dev/null | grep -E "소유자|발급자|유효|SHA1|SHA-1|MD5|서명 알고리즘|Owner:|Issuer:|Valid|Certificate fingerprints" || \
          keytool -list -v \
            -keystore levelup-release.keystore \
            -alias levelup-key \
            -storepass "${{ github.event.inputs.store_password }}" \
            2>/dev/null | grep -E "SHA1|SHA-1|SHA256"
          echo "========================================="

      # base64 인코딩 — GitHub Secrets 등록용
      - name: base64 인코딩 출력 (RELEASE_KEYSTORE_BASE64 Secret 값)
        run: |
          echo "========================================="
          echo "⬇️  아래 값을 GitHub Secret 'RELEASE_KEYSTORE_BASE64'에 저장하세요"
          echo "========================================="
          base64 -w 0 levelup-release.keystore
          echo ""
          echo "========================================="
          echo ""
          echo "## 📌 GitHub Secrets 등록 방법"
          echo ""
          echo "1. GitHub 저장소 → Settings → Secrets and variables → Actions"
          echo "2. 'New repository secret' 클릭 후 아래 4개 등록:"
          echo ""
          echo "   이름: RELEASE_KEYSTORE_BASE64"
          echo "   값: (위 base64 출력값 전체 복사)"
          echo ""
          echo "   이름: RELEASE_KEYSTORE_PASSWORD"
          echo "   값: (입력한 키스토어 비밀번호)"
          echo ""
          echo "   이름: RELEASE_KEY_ALIAS"
          echo "   값: levelup-key"
          echo ""
          echo "   이름: RELEASE_KEY_PASSWORD"
          echo "   값: (입력한 키 비밀번호)"

      # 워크플로우 요약
      - name: 설정 완료 요약
        run: |
          echo "## ✅ 키스토어 생성 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📌 다음 단계" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**1. GitHub Secrets 등록** (Settings → Secrets → Actions → New repository secret)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret 이름 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`RELEASE_KEYSTORE_BASE64\` | 위 로그의 base64 출력값 |" >> $GITHUB_STEP_SUMMARY
          echo "| \`RELEASE_KEYSTORE_PASSWORD\` | 입력한 키스토어 비밀번호 |" >> $GITHUB_STEP_SUMMARY
          echo "| \`RELEASE_KEY_ALIAS\` | \`levelup-key\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`RELEASE_KEY_PASSWORD\` | 입력한 키 비밀번호 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**2. Firebase SHA-1 등록**" >> $GITHUB_STEP_SUMMARY
          echo "위 로그에서 SHA-1 지문을 복사하여 Firebase Console → 프로젝트 설정 → Android 앱에 추가" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**3. 이 워크플로우 파일 삭제**" >> $GITHUB_STEP_SUMMARY
          echo "\`.github/workflows/generate-keystore.yml\` 파일을 삭제하세요 (재실행 방지)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ **중요**: 비밀번호를 별도로 안전하게 기록해두세요. Secrets에서는 다시 볼 수 없습니다." >> $GITHUB_STEP_SUMMARY
