name: 보안 스캔

on:
  schedule:
    - cron: '0 3 * * 1'  # 매주 월요일 03:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: 의존성 취약점 검사
    runs-on: ubuntu-22.04
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5

      - name: Node.js 셋업
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: 루트 의존성 감사 (npm audit)
        run: |
          echo "📦 루트 패키지 의존성 감사..."
          npm audit --audit-level=high --json > audit-root.json || true
          HIGH=$(cat audit-root.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0))" 2>/dev/null || echo "0")
          CRITICAL=$(cat audit-root.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo "0")
          echo "High: $HIGH, Critical: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::루트 패키지에 Critical 취약점 ${CRITICAL}개가 발견되었습니다."
            npm audit --audit-level=critical
            exit 1
          fi
          echo "✅ 루트 패키지 감사 통과"

      - name: Functions 의존성 감사
        working-directory: ./functions
        run: |
          echo "📦 Functions 패키지 의존성 감사..."
          npm install --package-lock-only 2>/dev/null || true
          npm audit --audit-level=high --json > ../audit-functions.json || true
          HIGH=$(cat ../audit-functions.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0))" 2>/dev/null || echo "0")
          CRITICAL=$(cat ../audit-functions.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo "0")
          echo "High: $HIGH, Critical: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Functions 패키지에 Critical 취약점 ${CRITICAL}개가 발견되었습니다."
            npm audit --audit-level=critical
            exit 1
          fi
          echo "✅ Functions 패키지 감사 통과"

  secret-scan:
    name: 시크릿 누출 스캔 (gitleaks)
    runs-on: ubuntu-22.04
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: gitleaks 시크릿 스캔
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  firestore-rules-check:
    name: Firestore 규칙 보안 검증
    runs-on: ubuntu-22.04
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5

      - name: Firestore 규칙 필수 보안 패턴 확인
        run: |
          echo "🔍 Firestore 규칙 보안 패턴 검사..."
          ISSUES=0

          # 1. allow read/write: if true; 패턴 감지 (전체 공개 접근)
          if grep -n 'allow.*:.*if true;' firestore.rules | grep -v 'allow read: if true' | grep -q .; then
            echo "::warning::비인증 전체 쓰기 허용 패턴이 감지되었습니다."
            grep -n 'allow write.*:.*if true;' firestore.rules || true
          fi

          # 2. request.auth != null 검증 누락 확인
          WRITE_RULES=$(grep -c 'allow write\|allow create\|allow update\|allow delete' firestore.rules || echo 0)
          AUTH_CHECKS=$(grep -c 'request.auth != null' firestore.rules || echo 0)
          echo "  쓰기 규칙 수: $WRITE_RULES, 인증 검사 수: $AUTH_CHECKS"

          # 3. rate_limits 컬렉션 클라이언트 접근 차단 확인
          if ! grep -A2 'match /rate_limits/' firestore.rules | grep -q 'allow read, write: if false'; then
            echo "::error::rate_limits 컬렉션의 클라이언트 접근이 차단되지 않았습니다."
            ISSUES=$((ISSUES + 1))
          fi

          # 4. security_alerts 컬렉션 쓰기 차단 확인
          if ! grep -A2 'match /security_alerts/' firestore.rules | grep -q 'allow write: if false'; then
            echo "::error::security_alerts 컬렉션의 클라이언트 쓰기가 차단되지 않았습니다."
            ISSUES=$((ISSUES + 1))
          fi

          if [ $ISSUES -gt 0 ]; then
            echo "::error::Firestore 규칙에서 ${ISSUES}개의 보안 문제가 발견되었습니다."
            exit 1
          fi
          echo "✅ Firestore 규칙 보안 패턴 검사 통과"
