name: Security Scan

on:
  schedule:
    - cron: '0 3 * * 1'  # 매주 월요일 03:00 UTC
  push:
    branches: [main]

jobs:
  firestore-rules-test:
    name: Firestore Rules 자동화 테스트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm ci && break
            if [ "$i" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
            echo "npm ci failed (attempt $i), retrying in 10s..."
            sleep 10
          done

      - name: Setup Java (Firebase Emulator 요구사항)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run Firestore Rules tests
        run: npm run test:rules

  audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Install functions dependencies
        run: npm ci
        working-directory: ./functions
        shell: bash
        continue-on-error: true

      - name: Retry functions dependency install on network errors
        if: ${{ failure() }}
        working-directory: ./functions
        run: |
          for i in 1 2 3; do
            npm ci && exit 0
            if [ "$i" -eq 3 ]; then
              echo "functions npm ci failed after 3 attempts"
              exit 1
            fi
            echo "functions npm ci failed (attempt $i), retrying in 10s..."
            sleep 10
          done

      - name: Audit functions dependencies
        run: npm audit --audit-level=high
        working-directory: ./functions
        continue-on-error: true

  secrets-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Scan for secrets (working tree only)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --no-git --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
