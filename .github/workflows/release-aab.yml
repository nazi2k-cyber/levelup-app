name: 릴리즈 AAB 빌드 (플레이스토어 제출용)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '버전 이름 (예: 1.0.0) — 비워두면 VERSION 파일에서 읽음'
        required: false
        default: ''
      version_code:
        description: '버전 코드 (정수, 매 릴리즈마다 증가)'
        required: true
        default: '1'
      changelog_entry:
        description: '이번 릴리즈 변경사항 (CHANGELOG.md에 자동 추가, 한국어)'
        required: false
        default: ''
      en_changelog_entry:
        description: '영문 출시 노트 (구글 플레이 en-US, 미입력 시 기본 메시지 사용)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-release-aab:
    runs-on: ubuntu-22.04

    steps:
      # 1. 소스코드 체크아웃
      - name: 소스코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 1-1. 버전 결정 (입력값 우선, 없으면 VERSION 파일)
      - name: 버전 결정
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version_name }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            echo "$VERSION" > VERSION
            echo "📦 입력된 버전 사용: $VERSION"
          else
            VERSION=$(cat VERSION | tr -d '[:space:]')
            echo "📦 VERSION 파일에서 읽음: $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # 1-2. 버전 동기화 (package.json, sw.js 등)
      - name: 버전 동기화
        run: bash scripts/version-bump.sh

      # 1-3. CHANGELOG.md 자동 업데이트
      - name: CHANGELOG.md 업데이트
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG_ENTRY="${{ github.event.inputs.changelog_entry }}"
          TODAY=$(date -u +%Y-%m-%d)

          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "ℹ️ CHANGELOG.md에 v$VERSION 항목이 이미 존재합니다."
          else
            if [ -z "$CHANGELOG_ENTRY" ]; then
              CHANGELOG_ENTRY="릴리즈 v$VERSION"
            fi
            # 첫 번째 ## 항목 앞에 새 버전 항목 삽입
            {
              echo "## [$VERSION] - $TODAY"
              echo ""
              echo "### 변경"
              echo "- $CHANGELOG_ENTRY"
              echo ""
            } > /tmp/changelog_block.txt
            LINE_NUM=$(grep -n "^## \[" CHANGELOG.md | head -1 | cut -d: -f1)
            { head -n $((LINE_NUM - 1)) CHANGELOG.md; cat /tmp/changelog_block.txt; tail -n +"${LINE_NUM}" CHANGELOG.md; } > /tmp/changelog_new.md
            mv /tmp/changelog_new.md CHANGELOG.md
            echo "✅ CHANGELOG.md에 v$VERSION 항목 추가됨"
          fi

      # 1-4. 버전 변경사항 커밋
      - name: 버전 변경사항 커밋
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md package.json www/sw.js www/app.js functions/package.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "release: v${VERSION} 버전 업데이트 및 CHANGELOG 갱신"
            git push
            echo "✅ 버전 변경사항 커밋 완료"
          else
            echo "ℹ️ 버전 관련 변경사항 없음"
          fi

      # 2. Node.js 환경 셋업
      - name: Node.js 셋업
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      # 3. Java 17 환경 셋업
      - name: Java 17 셋업
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Android SDK 환경변수 설정
      - name: Android SDK 환경변수 설정
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      # 5. 릴리즈 키스토어 복원 (GitHub Secrets에서)
      - name: 릴리즈 키스토어 복원
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "❌ RELEASE_KEYSTORE_BASE64 시크릿이 설정되지 않았습니다."
            echo "   아래 절차를 따라 릴리즈 키스토어를 생성하고 시크릿에 등록하세요:"
            echo ""
            echo "   1. 키스토어 생성:"
            echo "      keytool -genkeypair -v \\"
            echo "        -keystore levelup-release.keystore \\"
            echo "        -alias levelup-key \\"
            echo "        -keyalg RSA -keysize 2048 -validity 25000 \\"
            echo "        -storepass YOUR_STORE_PASSWORD \\"
            echo "        -keypass YOUR_KEY_PASSWORD \\"
            echo "        -dname \"CN=BRAVECAT STUDIOS,O=BRAVECAT,C=KR\""
            echo ""
            echo "   2. Base64 인코딩:"
            echo "      base64 -w 0 levelup-release.keystore"
            echo ""
            echo "   3. GitHub Secrets에 등록:"
            echo "      - RELEASE_KEYSTORE_BASE64: (base64 결과값)"
            echo "      - RELEASE_KEYSTORE_PASSWORD: (스토어 비밀번호)"
            echo "      - RELEASE_KEY_ALIAS: levelup-key"
            echo "      - RELEASE_KEY_PASSWORD: (키 비밀번호)"
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
          echo "✅ 릴리즈 키스토어 복원 완료"

      # 5-1. 키스토어 자격증명 사전 검증
      - name: 키스토어 자격증명 검증
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "🔍 키스토어 자격증명 검증 중..."

          # 1) 스토어 비밀번호 + alias 검증
          if ! keytool -list -alias "$RELEASE_KEY_ALIAS" \
              -keystore release.keystore \
              -storepass "$RELEASE_KEYSTORE_PASSWORD" \
              -noprompt > /dev/null 2>&1; then
            echo "❌ 키스토어 검증 실패!"
            echo ""
            echo "원인: RELEASE_KEYSTORE_PASSWORD 또는 RELEASE_KEY_ALIAS 시크릿이 틀렸습니다."
            echo "  현재 설정된 alias: $RELEASE_KEY_ALIAS"
            echo ""
            echo "키스토어에 실제로 존재하는 alias 목록:"
            keytool -list -keystore release.keystore \
              -storepass "$RELEASE_KEYSTORE_PASSWORD" \
              -noprompt 2>/dev/null | grep "Alias name:" || echo "  (스토어 비밀번호도 틀렸거나 키스토어가 손상됨)"
            echo ""
            echo "해결 방법:"
            echo "  GitHub Settings → Secrets → RELEASE_KEY_ALIAS 값을 위 목록의 alias로 수정하거나"
            echo "  RELEASE_KEYSTORE_PASSWORD 값이 올바른지 확인하세요."
            exit 1
          fi
          echo "  ✅ 스토어 비밀번호 및 alias 확인 완료: $RELEASE_KEY_ALIAS"

          # 2) 키 비밀번호 검증 (jarsigner로 실제 키 접근 시도)
          echo "test" > /tmp/_ks_test.txt
          zip -q /tmp/_ks_test.jar /tmp/_ks_test.txt
          if ! jarsigner \
              -keystore release.keystore \
              -storepass "$RELEASE_KEYSTORE_PASSWORD" \
              -keypass "$RELEASE_KEY_PASSWORD" \
              -signedjar /tmp/_ks_signed.jar \
              /tmp/_ks_test.jar \
              "$RELEASE_KEY_ALIAS" > /dev/null 2>&1; then
            echo "❌ 키 비밀번호 검증 실패!"
            echo ""
            echo "원인: RELEASE_KEY_PASSWORD 시크릿이 틀렸습니다."
            echo "  현재 alias: $RELEASE_KEY_ALIAS"
            echo ""
            echo "해결 방법:"
            echo "  GitHub Settings → Secrets → RELEASE_KEY_PASSWORD 값이"
            echo "  키스토어 생성 시 '-keypass'에 사용한 비밀번호와 일치하는지 확인하세요."
            exit 1
          fi
          rm -f /tmp/_ks_test.txt /tmp/_ks_test.jar /tmp/_ks_signed.jar
          echo "  ✅ 키 비밀번호 확인 완료"
          echo "✅ 키스토어 자격증명 검증 성공"

      # 6. npm 패키지 설치
      - name: npm 패키지 설치
        run: npm ci

      # 7. 웹 빌드 디렉토리 준비 (Capacitor 엔트리포인트 오버라이드)
      - name: 웹 빌드 디렉토리 준비
        run: |
          # Capacitor는 www/index.html을 엔트리포인트로 사용 — app.html 내용으로 오버라이드
          cp www/app.html www/index.html

      # 8. Google Web Client ID 주입
      - name: Google Web Client ID 주입
        if: env.GOOGLE_WEB_CLIENT_ID != ''
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          sed -i "s|233040099152-REPLACE_WITH_WEB_CLIENT_HASH.apps.googleusercontent.com|$GOOGLE_WEB_CLIENT_ID|g" capacitor.config.json

      # 9. Android 플랫폼 추가
      - name: Android 플랫폼 추가
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
        env:
          CI: true

      # 10. google-services.json 배치
      - name: google-services.json 배치
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ] && echo "$GOOGLE_SERVICES_JSON" | grep -q '"com.levelup.reboot"'; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ GOOGLE_SERVICES_JSON 시크릿 사용"
          else
            echo "❌ GOOGLE_SERVICES_JSON 시크릿이 설정되지 않았습니다."
            echo "GitHub Settings → Secrets → GOOGLE_SERVICES_JSON에 google-services.json 내용을 등록하세요."
            exit 1
          fi

      # 11. 네이티브 플러그인 소스 주입
      - name: 네이티브 플러그인 소스 주입
        run: |
          PLUGIN_DIR="android/app/src/main/java/com/levelup/reboot/plugins"
          mkdir -p "$PLUGIN_DIR"
          cp native-plugins/*.java "$PLUGIN_DIR/"
          echo "✅ 네이티브 플러그인 주입 완료"

      # 12. 커스텀 앱 아이콘 적용
      - name: 커스텀 앱 아이콘 적용
        run: |
          RES_DIR="android/app/src/main/res"
          for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            for icon in levelup.png levelup_foreground.png levelup_background.png levelup_monochrome.png; do
              src="res/mipmap-${density}/${icon}"
              dst="${RES_DIR}/mipmap-${density}/${icon}"
              [ -f "$src" ] && cp "$src" "$dst" && echo "  ✅ ${density}/${icon}"
            done
          done
          cp res/mipmap-anydpi-v26/levelup.xml "${RES_DIR}/mipmap-anydpi-v26/levelup.xml"
          MANIFEST="${RES_DIR}/../AndroidManifest.xml"
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@mipmap/levelup"|g' "$MANIFEST"
          sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"|android:roundIcon="@mipmap/levelup"|g' "$MANIFEST"
          echo "✅ 앱 아이콘 적용 완료"

      # 13. 웹→Android 동기화
      - name: 웹→Android 동기화
        run: npx cap sync android
        env:
          CI: true

      # 14. Android 권한 자동 주입
      - name: Android 권한 자동 주입
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST" && \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "$MANIFEST"
          ! grep -q "ACTIVITY_RECOGNITION" "$MANIFEST" && \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACTIVITY_RECOGNITION" />' "$MANIFEST"
          ! grep -q "health.permission.read.Steps" "$MANIFEST" && \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.health.READ_STEPS" />' "$MANIFEST"
          ! grep -q "android.permission.CAMERA" "$MANIFEST" && \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.CAMERA" />' "$MANIFEST"
          ! grep -q "ACTION_SHOW_PERMISSIONS_RATIONALE" "$MANIFEST" && \
            sed -i '/<\/activity>/i\            <intent-filter>\n                <action android:name="androidx.health.ACTION_SHOW_PERMISSIONS_RATIONALE" />\n            </intent-filter>' "$MANIFEST"
          echo "✅ 권한 주입 완료"
          grep "uses-permission" "$MANIFEST"

      # 15. MainActivity.java 플러그인 등록
      - name: 커스텀 플러그인 등록 주입 (MainActivity.java)
        run: |
          MAIN_ACTIVITY="android/app/src/main/java/com/levelup/reboot/MainActivity.java"
          if ! grep -q "registerPlugin(AppSettingsPlugin" "$MAIN_ACTIVITY"; then
            {
              echo 'package com.levelup.reboot;'
              echo 'import com.getcapacitor.BridgeActivity;'
              echo 'import com.levelup.reboot.plugins.AppSettingsPlugin;'
              echo 'import com.levelup.reboot.plugins.GoogleFitPlugin;'
              echo 'import com.levelup.reboot.plugins.HealthConnectPlugin;'
              echo 'import com.levelup.reboot.plugins.FCMPlugin;'
              echo 'import com.levelup.reboot.plugins.NativeAdPlugin;'
              echo 'public class MainActivity extends BridgeActivity {'
              echo '    @Override'
              echo '    public void onCreate(android.os.Bundle savedInstanceState) {'
              echo '        registerPlugin(AppSettingsPlugin.class);'
              echo '        registerPlugin(GoogleFitPlugin.class);'
              echo '        registerPlugin(HealthConnectPlugin.class);'
              echo '        registerPlugin(FCMPlugin.class);'
              echo '        registerPlugin(NativeAdPlugin.class);'
              echo '        super.onCreate(savedInstanceState);'
              echo '    }'
              echo '}'
            } > "$MAIN_ACTIVITY"
          fi
          echo "✅ 플러그인 등록 완료"

      # 16. Health Connect + Google Fit Gradle 의존성 주입
      - name: Gradle 의존성 및 SDK 버전 주입
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          ! grep -q "health.connect" "$BUILD_GRADLE" && \
            sed -i '/^dependencies {/a\    implementation "androidx.health.connect:connect-client:1.1.0-alpha07"' "$BUILD_GRADLE"
          if ! grep -q "play-services-fitness" "$BUILD_GRADLE"; then
            sed -i '/^dependencies {/a\    implementation "com.google.android.gms:play-services-fitness:21.2.0"' "$BUILD_GRADLE"
            sed -i '/^dependencies {/a\    implementation "com.google.android.gms:play-services-auth:21.3.0"' "$BUILD_GRADLE"
          fi
          ! grep -q "firebase-messaging" "$BUILD_GRADLE" && \
            sed -i '/^dependencies {/a\    implementation "com.google.firebase:firebase-messaging:24.0.0"' "$BUILD_GRADLE"

          # AdMob 의존성 (NativeAdPlugin 네이티브 광고)
          if ! grep -q "play-services-ads" "$BUILD_GRADLE"; then
            sed -i '/^dependencies {/a\    implementation "com.google.android.gms:play-services-ads:23.6.0"' "$BUILD_GRADLE"
          fi

          # compileSdk / targetSdk → 34 이상
          sed -i 's/compileSdk\s*=\s*3[0-3]/compileSdk = 34/' "$BUILD_GRADLE"
          sed -i 's/compileSdkVersion\s*3[0-3]/compileSdkVersion 34/' "$BUILD_GRADLE"
          sed -i 's/targetSdk\s*=\s*3[0-3]/targetSdk = 34/' "$BUILD_GRADLE"
          sed -i 's/targetSdkVersion\s*3[0-3]/targetSdkVersion 34/' "$BUILD_GRADLE"
          # minSdk → 26 (Health Connect 필수)
          sed -i 's/minSdkVersion\s*=\s*[0-9]\+/minSdkVersion = 26/' android/variables.gradle
          echo "✅ Gradle 의존성 및 SDK 버전 설정 완료"

      # 17. 버전 코드 / 버전 이름 주입
      - name: 버전 정보 주입
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          VERSION_NAME="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          sed -i "s/versionCode [0-9]\+/versionCode ${VERSION_CODE}/" "$BUILD_GRADLE"
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" "$BUILD_GRADLE"
          echo "✅ 버전 정보 설정: versionName=${VERSION_NAME}, versionCode=${VERSION_CODE}"
          grep -E "versionCode|versionName" "$BUILD_GRADLE"

      # 18. 릴리즈 서명 설정 (build.gradle에 signingConfigs 주입)
      - name: 릴리즈 서명 설정 주입
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cp release.keystore android/app/release.keystore

          python3 - << 'PYEOF'
          import re, sys

          path = 'android/app/build.gradle'
          with open(path) as f:
              content = f.read()

          signing_config_block = (
              '\n        release {\n'
              '            storeFile file("release.keystore")\n'
              '            storePassword System.getenv("RELEASE_KEYSTORE_PASSWORD")\n'
              '            keyAlias System.getenv("RELEASE_KEY_ALIAS")\n'
              '            keyPassword System.getenv("RELEASE_KEY_PASSWORD")\n'
              '        }'
          )

          # 1. signingConfigs 블록 삽입
          if 'signingConfigs' not in content:
              # android { 바로 다음에 signingConfigs 블록 전체 삽입
              signing_full = (
                  '\n    signingConfigs {'
                  + signing_config_block
                  + '\n    }'
              )
              content = re.sub(r'(android\s*\{)', r'\1' + signing_full, content, count=1)
              print('signingConfigs 블록 신규 삽입')
          elif 'storeFile file("release.keystore")' not in content:
              # 기존 signingConfigs에 release 블록 추가
              content = re.sub(
                  r'(signingConfigs\s*\{)',
                  r'\1' + signing_config_block,
                  content, count=1
              )
              print('signingConfigs에 release 블록 추가')
          else:
              print('signingConfigs.release 이미 존재')

          # 2. buildTypes.release에 signingConfig signingConfigs.release 참조 삽입
          if 'signingConfig signingConfigs.release' not in content:
              # buildTypes { ... release { 패턴을 찾아 signingConfig 한 줄 삽입
              content = re.sub(
                  r'(buildTypes\s*\{.*?release\s*\{)',
                  r'\1\n            signingConfig signingConfigs.release',
                  content, count=1, flags=re.DOTALL
              )
              print('buildTypes.release에 signingConfig 참조 삽입')
          else:
              print('signingConfig signingConfigs.release 이미 존재')

          with open(path, 'w') as f:
              f.write(content)

          # 검증
          final = open(path).read()
          if 'signingConfig signingConfigs.release' not in final:
              print('ERROR: signingConfig signingConfigs.release 주입 실패')
              sys.exit(1)
          if 'storeFile file("release.keystore")' not in final:
              print('ERROR: signingConfigs.release 블록 주입 실패')
              sys.exit(1)
          print('OK: 릴리즈 서명 설정 주입 완료')
          PYEOF

          echo ""
          echo "📋 서명 설정 확인:"
          grep -n "signingConfig\|signingConfigs\|storeFile\|storePassword\|keyAlias\|keyPassword" android/app/build.gradle | head -30

      # 19. Gradle 실행 권한 부여
      - name: Gradle 실행 권한 부여
        run: chmod +x android/gradlew

      # 20. 릴리즈 AAB 빌드
      - name: 릴리즈 AAB 빌드
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease --stacktrace

      # 21. AAB 서명 검증
      - name: AAB 서명 검증
        run: |
          AAB_PATH="android/app/build/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB_PATH" ]; then
            echo "✅ AAB 빌드 성공: $AAB_PATH"
            ls -lh "$AAB_PATH"
          else
            echo "❌ AAB 파일을 찾을 수 없습니다."
            find android/app/build/outputs/ -name "*.aab" 2>/dev/null || true
            exit 1
          fi

      # 21-1. AAB 파일명에 버전 반영
      - name: AAB 파일명 버전 반영
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          AAB_DIR="android/app/build/outputs/bundle/release"
          cp "${AAB_DIR}/app-release.aab" "${AAB_DIR}/levelup-reboot-v${VERSION}-(${VERSION_CODE})-release.aab"
          echo "✅ AAB 파일명: levelup-reboot-v${VERSION}-(${VERSION_CODE})-release.aab"

      # 21-2. 출시 노트 문서 생성 (플레이스토어 형식)
      - name: 출시 노트 문서 생성
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # CHANGELOG.md에서 현재 버전의 한국어 항목 추출 (bullet points만)
          KO_NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found && /^- /{print}" CHANGELOG.md \
            | sed 's/^- feat: /- /; s/^- fix: /- /; s/^- ci: /- /; s/^- chore: /- /; s/^- refactor: /- /; s/^- style: /- /')

          if [ -z "$KO_NOTES" ]; then
            KO_NOTES="- 버그 수정 및 성능 개선"
          fi

          # 영문 노트 (입력값 우선, 없으면 기본 메시지)
          EN_NOTES="${{ github.event.inputs.en_changelog_entry }}"
          if [ -z "$EN_NOTES" ]; then
            EN_NOTES="Bug fixes and performance improvements."
          fi

          # 500자 초과 경고 (플레이스토어 제한)
          KO_LEN=$(printf '%s' "$KO_NOTES" | wc -c)
          EN_LEN=$(printf '%s' "$EN_NOTES" | wc -c)
          [ "$KO_LEN" -gt 500 ] && echo "⚠️ 한국어 출시 노트 ${KO_LEN}자 — 500자 초과 시 플레이스토어에서 잘릴 수 있습니다."
          [ "$EN_LEN" -gt 500 ] && echo "⚠️ 영문 출시 노트 ${EN_LEN}자 — 500자 초과 시 플레이스토어에서 잘릴 수 있습니다."

          # 플레이스토어 형식 파일 생성
          mkdir -p release-notes
          NOTES_FILE="release-notes/release-notes-v${VERSION}.txt"
          {
            printf '<ko-KR>\n'
            printf '%s\n' "$KO_NOTES"
            printf '</ko-KR>\n'
            printf '<en-US>\n'
            printf '%s\n' "$EN_NOTES"
            printf '</en-US>\n'
          } > "$NOTES_FILE"

          echo "✅ 출시 노트 생성 완료: $NOTES_FILE"
          echo "--- 파일 내용 미리보기 ---"
          cat "$NOTES_FILE"

      # 22. AAB 및 출시 노트 아티팩트 업로드
      - name: AAB 및 출시 노트 업로드 (Artifact)
        uses: actions/upload-artifact@v5
        with:
          name: levelup-reboot-v${{ steps.version.outputs.version }}-(${{ github.event.inputs.version_code }})-release
          path: |
            android/app/build/outputs/bundle/release/levelup-reboot-v${{ steps.version.outputs.version }}-(${{ github.event.inputs.version_code }})-release.aab
            release-notes/
          retention-days: 90

      # 22-1. 릴리즈 Git 태그 생성
      - name: 릴리즈 Git 태그 생성
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "ℹ️ 태그 $TAG가 이미 존재합니다. 스킵."
          else
            git tag -a "$TAG" -m "릴리즈 v${VERSION} (versionCode: ${VERSION_CODE})"
            git push origin "$TAG"
            echo "✅ Git 태그 생성: $TAG"
          fi

      # 23. 빌드 결과 요약
      - name: 빌드 결과 요약
        if: success()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          NOTES_FILE="release-notes/release-notes-v${VERSION}.txt"
          echo "## ✅ 플레이스토어 릴리즈 AAB 빌드 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 앱 ID | \`com.levelup.reboot\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 버전 이름 | \`v${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 버전 코드 | \`${VERSION_CODE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 빌드 유형 | Release AAB |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB 파일 | \`levelup-reboot-v${VERSION}-(${VERSION_CODE})-release.aab\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 출시 노트 | \`release-notes-v${VERSION}.txt\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git 태그 | \`v${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 출시 노트 (플레이 콘솔 복붙용)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat "$NOTES_FILE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 다음 단계" >> $GITHUB_STEP_SUMMARY
          echo "1. 위 아티팩트에서 AAB 파일과 출시 노트를 다운로드하세요" >> $GITHUB_STEP_SUMMARY
          echo "2. Google Play Console → 프로덕션 트랙 → 새 릴리즈 만들기" >> $GITHUB_STEP_SUMMARY
          echo "3. AAB 파일을 업로드하세요" >> $GITHUB_STEP_SUMMARY
          echo "4. 위 출시 노트를 플레이 콘솔 '출시 노트' 필드에 붙여넣으세요" >> $GITHUB_STEP_SUMMARY
          echo "5. 검토를 위해 제출하세요" >> $GITHUB_STEP_SUMMARY
