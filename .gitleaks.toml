title = "LevelUp App — Gitleaks Configuration"

[extend]
useDefault = true

[allowlist]
description = "Known-safe public Firebase client-side config values"

# Example/template files contain placeholder values only — not real secrets.
paths = [
  "firebase-config.example.js",
  '''.*example.*''',
  '''.*template.*''',
]

# These are public Firebase client-side identifiers (not secrets).
# They appear in firebase-config.example.js, documentation, and scripts.
regexes = [
  "YOUR_API_KEY",
  "YOUR_PROJECT",
  "PLACEHOLDER",
  "levelup-app-53d02",
  "233040099152",
  "1:233040099152:web:82310514d26c8c6d52de55",
  "G-4DBGG03CCJ",
]

# NOTE: No custom [[rules]] block — the default gcp-api-key rule already detects
# AIza[0-9A-Za-z_-]{35} (Firebase/GCP API keys). A duplicate custom rule caused
# double-detection, bypassing .gitleaksignore suppressions for historical commits.
