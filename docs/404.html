<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <script>
    (function () {
      var path = window.location.pathname;
      var query = window.location.search || '';
      var hash = window.location.hash || '';
      var termMatch = path.match(/^\/terms\/(privacy|terms|usage-policy|account-deletion)\.html$/);

      if (termMatch) {
        window.location.replace('/www/terms/' + termMatch[1] + '.html' + query + hash);
        return;
      }

      window.location.replace('/');
    })();
  </script>
</head>
<body>
  <p>페이지를 찾을 수 없어 홈으로 이동합니다.</p>
</body>
</html>
