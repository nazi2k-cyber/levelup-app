<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEVEL UP: REBOOT — Admin Diagnostics</title>
<link rel="stylesheet" href="css/admin-base.css">
<link rel="stylesheet" href="css/admin-tabs.css">
<link rel="stylesheet" href="css/admin-diag.css">
<link rel="stylesheet" href="css/admin-log.css">
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <h1 style="margin:0;">LEVEL UP: REBOOT — Admin Diagnostics</h1>
        <a href="../push-test.html" target="_blank" style="font-size:0.8rem; color:#00e5ff; text-decoration:none; border:1px solid #2a2a3e; padding:6px 14px; border-radius:8px;">Push Admin &rarr;</a>
    </div>

    <!-- Login Section -->
    <div id="login-section">
        <div class="card">
            <p>관리자 인증이 필요합니다</p>
            <button class="btn btn-primary" id="btn-login">Google 로그인</button>
            <p id="login-error" style="display:none; color:#ff5252; margin-top:12px; font-size:0.85rem;"></p>
        </div>
    </div>

    <!-- Admin Section (hidden until auth) -->
    <div id="admin-section" class="hidden">
        <!-- User Info Bar -->
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px 20px;">
            <div class="flex-center">
                <span class="text-sm" id="user-info">—</span>
                <span class="badge badge-info" id="admin-badge" style="display:none">ADMIN</span>
            </div>
            <button class="btn btn-outline btn-sm" id="btn-logout">로그아웃</button>
        </div>

        <!-- Tabs -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="diag">권한 진단</button>
            <button class="tab-btn" data-tab="rules">보안 규칙</button>
            <button class="tab-btn" data-tab="claims">Claim 관리</button>
            <button class="tab-btn" data-tab="dashboard">대시보드</button>
            <button class="tab-btn" data-tab="analytics">유저 분석</button>
            <button class="tab-btn" data-tab="usermgmt">유저 관리</button>
            <button class="tab-btn" data-tab="screening">포스팅 스크리닝</button>
            <button class="tab-btn" data-tab="autoscreen">자동 스크리닝</button>
            <button class="tab-btn" data-tab="reports">신고 관리</button>
        </nav>

        <!-- Tab Contents -->
        <div id="tab-diag" class="tab-content active"></div>
        <div id="tab-rules" class="tab-content"></div>
        <div id="tab-claims" class="tab-content"></div>
        <div id="tab-dashboard" class="tab-content"></div>
        <div id="tab-analytics" class="tab-content"></div>
        <div id="tab-usermgmt" class="tab-content"></div>
        <div id="tab-screening" class="tab-content"></div>
        <div id="tab-autoscreen" class="tab-content"></div>
        <div id="tab-reports" class="tab-content"></div>
    </div>
</div>

<!-- LEVEL UP: REBOOT — Admin Diagnostics v2.2 -->
<div id="log-panel" class="log-panel collapsed">
    <div class="log-header" onclick="toggleLogPanel()">
        <span>로그 <span class="log-badge" id="log-count">0</span></span>
        <div class="log-actions">
            <button onclick="event.stopPropagation(); copyLogs()">복사</button>
            <button onclick="event.stopPropagation(); downloadLogs()">다운로드</button>
            <button onclick="event.stopPropagation(); clearLogs()">지우기</button>
        </div>
    </div>
    <div class="log-filter-bar" onclick="event.stopPropagation()">
        <button class="log-filter-btn active" data-filter="ALL" onclick="filterLogs('ALL')">전체</button>
        <button class="log-filter-btn" data-filter="ERROR" onclick="filterLogs('ERROR')">ERROR</button>
        <button class="log-filter-btn" data-filter="WARN" onclick="filterLogs('WARN')">WARN</button>
        <button class="log-filter-btn" data-filter="OK" onclick="filterLogs('OK')">OK</button>
        <button class="log-filter-btn" data-filter="INFO" onclick="filterLogs('INFO')">INFO</button>
    </div>
    <div class="log-entries" id="log-entries"></div>
</div>
<div class="log-panel-spacer"></div>

<script src="../firebase-config.js"></script>
<script type="module">
import { auth } from "./js/firebase-init.js";
import { onAdminAuth, doLogin, doLogout, isAdmin, isMaster } from "./js/auth.js";
import { initLogPanel, tlog, tok, timed } from "./js/log-panel.js";
import { initTabs } from "./js/tab-nav.js";
import { initDiagPermissions } from "./js/diag-permissions.js";
import { initDiagRules } from "./js/diag-rules.js";
import { initAdminClaims } from "./js/admin-claims.js";
import { initDashboard, loadDashboard } from "./js/dashboard.js";
import { initUserAnalytics, loadUserAnalytics } from "./js/user-analytics.js";
import { initUserManagement } from "./js/user-management.js";
import { initPostScreening } from "./js/post-screening.js";
import { initAutoScreening } from "./js/auto-screening.js";
import { initReportManagement } from "./js/report-management.js";

// Initialize log panel and tabs
initLogPanel();
initTabs();

tlog("Init", "Admin Diagnostics 페이지 로딩...");

// Login / Logout buttons
const loginErrorEl = document.getElementById("login-error");

function showLoginError(msg) {
    loginErrorEl.textContent = msg;
    loginErrorEl.style.display = "";
    tlog("Auth Error", msg);
}

document.getElementById("btn-login").addEventListener("click", async () => {
    loginErrorEl.style.display = "none";
    try { await doLogin(); } catch (e) { showLoginError(e.userMessage || e.message); }
});

// 리다이렉트 로그인 에러 표시
window.addEventListener('admin-auth-error', (e) => { showLoginError(e.detail); });
document.getElementById("btn-logout").addEventListener("click", async () => {
    await doLogout();
});

// Auth state handler
onAdminAuth((user, admin, master, operator) => {
    const loginSec = document.getElementById("login-section");
    const adminSec = document.getElementById("admin-section");
    const userInfo = document.getElementById("user-info");
    const adminBadge = document.getElementById("admin-badge");

    if (user) {
        loginSec.classList.add("hidden");
        adminSec.classList.remove("hidden");
        userInfo.textContent = user.email || user.uid;

        // Show role badge
        if (master) {
            adminBadge.textContent = "MASTER";
            adminBadge.style.display = "";
        } else if (admin && !operator) {
            adminBadge.textContent = "ADMIN";
            adminBadge.style.display = "";
        } else if (operator) {
            adminBadge.textContent = "OPERATOR";
            adminBadge.style.display = "";
        } else {
            adminBadge.style.display = "none";
        }

        tok("Auth", `로그인: ${user.email} (admin: ${admin}, master: ${master}, operator: ${operator})`);

        // Initialize all tab modules
        initDiagPermissions("tab-diag");
        initDiagRules("tab-rules");
        initAdminClaims("tab-claims");
        initDashboard("tab-dashboard");
        initUserAnalytics("tab-analytics");
        initUserManagement("tab-usermgmt");
        initPostScreening("tab-screening");
        initAutoScreening("tab-autoscreen");
        initReportManagement("tab-reports");

        if (admin) { loadDashboard(); loadUserAnalytics(); }
    } else {
        loginSec.classList.remove("hidden");
        adminSec.classList.add("hidden");
        userInfo.textContent = "—";
        adminBadge.style.display = "none";
        tlog("Auth", "로그아웃됨");
    }
});

tok("Init", "Admin Diagnostics 준비 완료");
</script>
</body>
</html>
